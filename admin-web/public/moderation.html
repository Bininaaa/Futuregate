<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="page.content.title" data-i18n-fallback="Content · FutureGate Admin">Content · FutureGate Admin</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/app.css?v=2026042603">
  <link rel="stylesheet" href="css/i18n.css?v=2026043001">
  <script src="js/theme-init.js"></script>
  <script src="js/lang-init.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="moderation">
  <div id="auth-gate" class="auth-gate"><div class="spinner"></div><p data-i18n="shell.verifyingSession" data-i18n-fallback="Verifying session...">Verifying session...</p></div>
  <div id="shell"></div>

  <!-- Editor modal -->
  <div class="modal-backdrop" id="editor-modal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3 id="editor-title" data-i18n="mod.editorEdit" data-i18n-fallback="Edit">Edit</h3>
        <button class="modal-close" data-close-modal="editor-modal" data-i18n-aria-label="btn.close" data-i18n-aria-label-fallback="Close" aria-label="Close"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body" id="editor-body"></div>
      <div class="modal-footer">
        <button class="btn" data-close-modal="editor-modal" data-i18n="btn.cancel" data-i18n-fallback="Cancel">Cancel</button>
        <button class="btn btn-primary" id="editor-save"><i data-lucide="save"></i><span data-i18n="btn.save" data-i18n-fallback="Save">Save</span></button>
      </div>
    </div>
  </div>

  <!-- CV viewer -->
  <div class="modal-backdrop" id="cv-modal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3 data-i18n="mod.applicationCv" data-i18n-fallback="Application CV">Application CV</h3>
        <button class="modal-close" data-close-modal="cv-modal" data-i18n-aria-label="btn.close" data-i18n-aria-label-fallback="Close" aria-label="Close"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body" id="cv-body"></div>
    </div>
  </div>

  <script type="module">
    import { mountShell, showPage } from './js/shell.js';
    import { checkAuth, emptyStateHtml, esc, feedbackCardHtml, showToast, formatTimestamp } from './js/auth.js';
    import {
      auth, db, collection, doc, getDoc, getDocs, query, orderBy, limit, where,
      updateDoc, deleteDoc, serverTimestamp,
    } from './js/firebase-config.js';
    import { matchesSearch, getQueryParam, timestampToDate, updateUrlParams } from './js/admin-utils.js';
    import { logAdminActivity } from './js/activity-service.js';
    import { WORKER_BASE_URL } from './js/google-books-config.js';
    import {
      getApplicationCv,
      getApplicationCvDocument,
      openResolvedDocument,
      friendlyDocumentErrorMessage,
      resolveBuiltDocumentFields,
      resolvePrimaryDocumentFields,
    } from './js/document-access.js';
    import { openModal, closeModal } from './js/ui.js';
    import { t, applyTranslations } from './js/i18n.js';
    const ADMIN_PUBLISHER_NAME = 'FutureGate Content Team';

    const TABS = [
      { id: 'ideas',        labelKey: 'mod.tab.ideas',         labelFallback: 'Project ideas', icon: 'lightbulb' },
      { id: 'opportunities',labelKey: 'mod.tab.opportunities', labelFallback: 'Opportunities', icon: 'briefcase' },
      { id: 'scholarships', labelKey: 'mod.tab.scholarships',  labelFallback: 'Scholarships',  icon: 'graduation-cap' },
      { id: 'trainings',    labelKey: 'mod.tab.library',       labelFallback: 'Library',       icon: 'book-open' },
    ];

    function tabLabel(tab) { return t(tab.labelKey, tab.labelFallback); }
    function chipLabel(c) { return t(c.lk, c.l); }

    // Per-tab chip filter definitions (mirrors Flutter content center)
    const FILTERS = {
      ideas: [
        { v: 'all',      lk: 'mod.filter.all',           l: 'All',         i: 'list' },
        { v: 'admin',    lk: 'mod.filter.adminPosts',    l: 'Admin posts', i: 'shield' },
        { v: 'pending',  lk: 'status.pending',           l: 'Pending',     i: 'clock' },
        { v: 'approved', lk: 'status.approved',          l: 'Approved',    i: 'check' },
        { v: 'rejected', lk: 'status.rejected',          l: 'Rejected',    i: 'x-circle' },
        { v: 'hidden',   lk: 'status.hidden',            l: 'Hidden',      i: 'eye-off' },
      ],
      opportunities: [
        { v: 'all',         lk: 'mod.filter.allOpportunities', l: 'All opportunities', i: 'list' },
        { v: 'admin',       lk: 'mod.filter.adminPosts',       l: 'Admin posts',       i: 'shield' },
        { v: 'pendingApps', lk: 'mod.filter.hasPendingApps',   l: 'Has Pending Apps',  i: 'hourglass' },
        { v: 'featured',    lk: 'status.featured',             l: 'Featured',          i: 'star' },
        { v: 'closed',      lk: 'status.closed',               l: 'Closed',            i: 'lock' },
        { v: 'hidden',      lk: 'status.hidden',               l: 'Hidden',            i: 'eye-off' },
      ],
      opportunityTypes: [
        { v: 'all',         lk: 'mod.filter.anyType',  l: 'Any type',    i: 'layers' },
        { v: 'job',         lk: 'plural.jobs',         l: 'Jobs',        i: 'briefcase' },
        { v: 'internship',  lk: 'plural.internships',  l: 'Internships', i: 'backpack' },
        { v: 'sponsoring',  lk: 'plural.sponsoring',   l: 'Sponsoring',  i: 'gift' },
      ],
      scholarships: [
        { v: 'all',      lk: 'mod.filter.all',  l: 'All',      i: 'list' },
        { v: 'featured', lk: 'status.featured', l: 'Featured', i: 'star' },
        { v: 'hidden',   lk: 'status.hidden',   l: 'Hidden',   i: 'eye-off' },
      ],
      trainings: [
        { v: 'all',      lk: 'mod.filter.all',   l: 'All',      i: 'list' },
        { v: 'featured', lk: 'status.featured',  l: 'Featured', i: 'star' },
        { v: 'hidden',   lk: 'status.hidden',    l: 'Hidden',   i: 'eye-off' },
        { v: 'books',    lk: 'plural.books',     l: 'Books',    i: 'book' },
        { v: 'videos',   lk: 'plural.videos',    l: 'Videos',   i: 'video' },
      ],
    };

    const initialTabParam = getQueryParam('tab') || 'ideas';

    function normalizeActiveTab(value) {
      const normalized = String(value || '').trim();
      if (normalized === 'applications') return 'opportunities';
      if (normalized === 'library') return 'trainings';
      return normalized;
    }

    function normalizeFilterValue(tab, value) {
      const normalized = String(value || '').trim();
      const allowed = {
        ideas: new Set(['all', 'admin', 'pending', 'approved', 'rejected', 'hidden']),
        opportunities: new Set(['all', 'admin', 'pendingApps', 'featured', 'closed', 'hidden']),
        scholarships: new Set(['all', 'featured', 'hidden']),
        trainings: new Set(['all', 'featured', 'hidden', 'books', 'videos']),
      };

      if (!normalized) {
        return initialTabParam === 'applications' && tab === 'opportunities'
          ? 'pendingApps'
          : 'all';
      }

      const aliased =
        tab === 'opportunities' && normalized === 'pending_apps'
          ? 'pendingApps'
          : normalized;
      return allowed[tab]?.has(aliased) ? aliased : 'all';
    }

    function normalizeOpportunityType(value) {
      const normalized = String(value || '').trim();
      return FILTERS.opportunityTypes.some((item) => item.v === normalized)
        ? normalized
        : 'all';
    }

    function normalizeSalaryPeriod(value) {
      const normalized = String(value || '').trim().toLowerCase().replace(/[-\s]+/g, '_');
      const aliases = {
        hourly: 'hour',
        per_hour: 'hour',
        daily: 'day',
        per_day: 'day',
        weekly: 'week',
        per_week: 'week',
        monthly: 'month',
        per_month: 'month',
        yearly: 'year',
        annually: 'year',
        annual: 'year',
        per_year: 'year',
      };
      const canonical = aliases[normalized] || normalized;
      return ['hour', 'day', 'week', 'month', 'year'].includes(canonical) ? canonical : '';
    }

    function normalizeLibrarySource(value) {
      const normalized = String(value || '').trim();
      return ['overview', 'books', 'youtube'].includes(normalized)
        ? normalized
        : 'overview';
    }

    function normalizeLibraryMode(value) {
      const normalized = String(value || '').trim();
      return ['search', 'manage'].includes(normalized) ? normalized : 'search';
    }

    function activeAdminId() {
      return String(auth.currentUser?.uid || '').trim();
    }

    function isOwnAdminIdea(item) {
      const adminId = activeAdminId();
      return !!adminId && String(item?.submittedBy || '').trim() === adminId;
    }

    function isAdminOpportunity(item) {
      return String(item?.createdByRole || '').trim().toLowerCase() === 'admin';
    }

    function canEditOpportunity(item) {
      const adminId = activeAdminId();
      return !!adminId &&
        isAdminOpportunity(item) &&
        String(item?.companyId || '').trim() === adminId;
    }

    function scholarshipFeatured(item) {
      return item?.featured === true || item?.isFeatured === true;
    }

    function scholarshipThumb(item) {
      return item?.imageUrl || item?.bannerUrl || item?.image || item?.coverImage || item?.thumbnailUrl || '';
    }

    function scholarshipLink(item) {
      return String(item?.link || item?.applyUrl || item?.applicationUrl || item?.url || '').trim();
    }

    function scholarshipLocation(item) {
      return String(item?.location || item?.locationLabel || item?.country || item?.destination || '').trim();
    }

    function scholarshipAmountLabel(item) {
      const amount = cleanText(item?.amount);
      if (!amount) return '';
      if (/^\d+([.,]\d+)?$/.test(amount)) return `${amount} DA`;
      return amount;
    }

    function scholarshipCategory(item) {
      return cleanText(item?.category || item?.domain || item?.field);
    }

    function scholarshipLevel(item) {
      return cleanText(item?.level || item?.academicLevel || item?.studyLevel);
    }

    function scholarshipEligibilityItems(item) {
      const direct = normalizeList(item?.eligibilityItems || item?.eligibility_items);
      return direct.length ? direct : splitLines(item?.eligibility);
    }

    function scholarshipTags(item) {
      return normalizeList(item?.tags || item?.domains || item?.categories || item?.fields).slice(0, 6);
    }

    function opportunityEffectiveStatus(item) {
      const status = String(item?.status || '').trim().toLowerCase();
      if (status === 'closed') {
        return 'closed';
      }

      const deadline = timestampToDate(item?.applicationDeadline || item?.deadline);
      if (!deadline) {
        return 'open';
      }

      const endOfDay = new Date(deadline);
      endOfDay.setHours(23, 59, 59, 999);
      return endOfDay.getTime() < Date.now() ? 'closed' : 'open';
    }

    function cleanText(value) {
      return String(value || '').trim();
    }

    function normalizeList(value) {
      if (Array.isArray(value)) {
        return value.map((item) => cleanText(item)).filter(Boolean);
      }
      if (typeof value === 'string') {
        return value
          .split(/[\n,]/)
          .map((item) => cleanText(item))
          .filter(Boolean);
      }
      return [];
    }

    function capitalizeLabel(value) {
      return cleanText(value)
        .replace(/[_-]+/g, ' ')
        .replace(/\s+/g, ' ')
        .replace(/\b\w/g, (letter) => letter.toUpperCase());
    }

    function displayLabel(value) {
      const text = cleanText(value);
      return text ? capitalizeLabel(text) : '';
    }

    function statusBadgeClass(status) {
      const normalized = cleanText(status).toLowerCase();
      if (['approved', 'accepted', 'open', 'visible'].includes(normalized)) return 'success';
      if (['rejected', 'closed', 'hidden'].includes(normalized)) return 'danger';
      if (['featured'].includes(normalized)) return 'warning';
      if (['reviewed'].includes(normalized)) return 'info';
      return 'warning';
    }

    function badge(label, className = '', icon = '') {
      const text = displayLabel(label);
      if (!text) return '';
      return `<span class="badge ${className}">${icon ? `<i data-lucide="${icon}"></i>` : ''}${esc(text)}</span>`;
    }

    function iconAction(id, action, icon, title, className = '') {
      return `<button class="btn btn-sm btn-icon ${className}" data-id="${esc(id)}" data-action="${esc(action)}" title="${esc(title)}" aria-label="${esc(title)}"><i data-lucide="${esc(icon)}"></i></button>`;
    }

    function textAction(id, action, icon, label, className = '') {
      return `<button class="btn btn-sm ${className}" data-id="${esc(id)}" data-action="${esc(action)}"><i data-lucide="${esc(icon)}"></i>${esc(label)}</button>`;
    }

    function externalLinkAction(url, icon, title) {
      const href = normalizeExternalUrl(url);
      if (!href) return '';
      return `<a class="btn btn-sm btn-icon" href="${esc(href)}" target="_blank" rel="noopener" title="${esc(title)}" aria-label="${esc(title)}"><i data-lucide="${esc(icon)}"></i></a>`;
    }

    function normalizeExternalUrl(value) {
      const href = cleanText(value);
      if (!href) return '';
      if (/^(https?:|mailto:|tel:)/i.test(href)) return href;
      if (href.startsWith('//')) return `https:${href}`;
      return `https://${href.replace(/^\/+/, '')}`;
    }

    function navigateTo(target) {
      if (typeof window.FutureGateWorkspace?.navigate === 'function') {
        window.FutureGateWorkspace.navigate(target);
        return;
      }
      window.location.href = target;
    }

    function profileLinkAction(userId, label = 'Publisher profile') {
      const id = cleanText(userId);
      if (!id) return '';
      return `<button class="btn btn-sm" type="button" data-publisher-id="${esc(id)}"><i data-lucide="user"></i>${esc(label)}</button>`;
    }

    function contentCard({
      id,
      tone = 'primary',
      icon = 'file-text',
      mediaHtml = '',
      title = '',
      subtitle = '',
      description = '',
      badges = [],
      meta = '',
      actions = [],
      footerActions = [],
      detailsAction = 'details',
    }) {
      const safeId = esc(id);
      const visibleBadges = badges.filter(Boolean).join('');
      const visibleActions = actions.filter(Boolean).join('');
      const visibleFooterActions = footerActions.filter(Boolean).join('');
      const safeDescription = cleanText(description);
      const safeMeta = cleanText(meta);
      return `<article class="content-card content-card--${esc(tone)}" data-row-id="${safeId}" data-open-details="${safeId}" data-action-open="${esc(detailsAction)}">
        <div class="content-card__main">
          <div class="content-card__media">${mediaHtml || `<i data-lucide="${esc(icon)}"></i>`}</div>
          <div class="content-card__body">
            <div class="content-card__title-row">
              <h3 class="content-card__title">${esc(title || t('mod.untitled', 'Untitled'))}</h3>
              ${safeMeta ? `<span class="content-card__meta"><i data-lucide="clock-3"></i>${esc(safeMeta)}</span>` : ''}
            </div>
            ${subtitle ? `<p class="content-card__subtitle">${esc(subtitle)}</p>` : ''}
            ${safeDescription ? `<p class="content-card__description">${esc(truncate(safeDescription, 180))}</p>` : ''}
            ${visibleBadges ? `<div class="content-card__badges">${visibleBadges}</div>` : ''}
          </div>
          ${visibleActions ? `<div class="content-card__actions">${visibleActions}</div>` : ''}
        </div>
        ${visibleFooterActions ? `<div class="content-card__footer">${visibleFooterActions}</div>` : ''}
      </article>`;
    }

    function detailMetric(label, value) {
      const text = cleanText(value) || '—';
      return `<div class="detail-metric"><div class="detail-metric__label">${esc(label)}</div><div class="detail-metric__value">${esc(text)}</div></div>`;
    }

    function applicationSummaryHtml({ total, pending, accepted, rejected }) {
      return `<div class="application-summary-row">
        <span class="badge badge-info"><i data-lucide="users"></i>${Number(total || 0).toLocaleString()} ${esc(t('count.totalLabel', 'Total'))}</span>
        <span class="badge badge-warning"><i data-lucide="hourglass"></i>${Number(pending || 0).toLocaleString()} ${esc(t('count.pending', 'Pending'))}</span>
        <span class="badge badge-success"><i data-lucide="check"></i>${Number(accepted || 0).toLocaleString()} ${esc(t('count.approved', 'Approved'))}</span>
        <span class="badge badge-danger"><i data-lucide="x"></i>${Number(rejected || 0).toLocaleString()} ${esc(t('count.rejected', 'Rejected'))}</span>
      </div>`;
    }

    function applicationStatus(value) {
      const normalized = cleanText(value || 'pending').toLowerCase();
      return ['accepted', 'rejected', 'withdrawn', 'reviewed'].includes(normalized)
        ? normalized
        : 'pending';
    }

    function applicationStatusCounts(applications) {
      return applications.reduce((counts, application) => {
        const status = applicationStatus(application.status);
        counts[status] = (counts[status] || 0) + 1;
        return counts;
      }, { pending: 0, accepted: 0, rejected: 0, withdrawn: 0, reviewed: 0 });
    }

    function applicationsForOpportunity(opportunityId) {
      return state.applications
        .filter((item) => item.opportunityId === opportunityId)
        .sort((a, b) => {
          const aTime = timestampToDate(a.appliedAt)?.getTime() || 0;
          const bTime = timestampToDate(b.appliedAt)?.getTime() || 0;
          return bTime - aTime;
        });
    }

    function studentApplications(studentId) {
      const id = cleanText(studentId);
      return state.applications
        .filter((item) => cleanText(item.studentId) === id)
        .sort((a, b) => {
          const aTime = timestampToDate(a.appliedAt)?.getTime() || 0;
          const bTime = timestampToDate(b.appliedAt)?.getTime() || 0;
          return bTime - aTime;
        });
    }

    function bindCardOpens(handler) {
      document.getElementById('list')?.querySelectorAll('[data-open-details]').forEach((card) => {
        card.addEventListener('click', (event) => {
          if (event.target.closest('button, a, [data-action]')) return;
          handler(card.getAttribute('data-open-details'), card.getAttribute('data-action-open') || 'details');
        });
      });
    }

    function bindPublisherActions(root = document) {
      root.querySelectorAll('[data-publisher-id]').forEach((button) => {
        if (button.dataset.publisherBound === 'true') return;
        button.dataset.publisherBound = 'true';
        button.addEventListener('click', (event) => {
          event.preventDefault();
          event.stopPropagation();
          openPublisherProfile(button.getAttribute('data-publisher-id'));
        });
      });
    }

    async function openPublisherProfile(userId) {
      const id = cleanText(userId);
      if (!id) return;
      const saveBtn = document.getElementById('editor-save');
      if (saveBtn) saveBtn.style.display = 'none';
      document.getElementById('editor-title').textContent = t('btn.publisherProfile', 'Publisher profile');
      document.getElementById('editor-body').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      openModal('editor-modal');
      try {
        const snap = await getDoc(doc(db, 'users', id));
        if (!snap.exists()) throw new Error('Publisher not found');
        const user = { id: snap.id, ...snap.data(), uid: cleanText(snap.data().uid || snap.id) };
        document.getElementById('editor-title').textContent = displayNameForPublisher(user);
        document.getElementById('editor-body').innerHTML = publisherProfileHtml(user);
        if (window.lucide) window.lucide.createIcons();
      } catch (error) {
        console.error('Publisher profile failed:', error);
        document.getElementById('editor-body').innerHTML = feedbackCardHtml(t('mod.couldNotLoadPublisher', 'Could not load publisher profile.'), { type: 'error' });
        if (window.lucide) window.lucide.createIcons();
      }
    }

    function publisherProfileHtml(user) {
      const role = cleanText(user.role || 'user').toLowerCase();
      const name = displayNameForPublisher(user);
      const initials = (name[0] || '?').toUpperCase();
      const logoUrl = cleanText(user.logo || user.companyLogo || user.logoUrl || user.companyLogoUrl || user.photoURL || user.photoUrl || user.profileImage);
      const roleSection = publisherRoleSection(user, role);
      const bioText = role === 'company'
        ? cleanText(user.description || user.bio)
        : cleanText(user.bio || user.description);
      const detailRows = [
        profileBlockHtml('Role', displayLabel(role) || 'User'),
      ];
      if (role !== 'admin') {
        if (cleanText(user.email)) detailRows.push(profileBlockHtml('Email', cleanText(user.email), { preserveCase: true }));
        if (cleanText(user.phone)) detailRows.push(profileBlockHtml('Phone', cleanText(user.phone), { preserveCase: true }));
      }
      if (cleanText(user.location || user.address)) {
        detailRows.push(profileBlockHtml('Location', cleanText(user.location || user.address)));
      }
      if (cleanText(user.website)) {
        detailRows.push(profileBlockHtml('Website', externalLinkHtml(user.website), { html: true }));
      }
      return `
        <div class="details-profile-hero">
          <div class="details-profile-avatar" style="background:${roleColor(role)}1a;color:${roleColor(role)}">
            ${logoUrl ? `<img src="${esc(logoUrl)}" alt="" style="width:100%;height:100%;object-fit:contain;border-radius:inherit;background:#fff;" onerror="this.parentNode.textContent='${esc(initials)}';">` : esc(initials)}
          </div>
          <div>
            <div class="details-profile-name">${esc(name)}</div>
            <div class="row-sub">${esc(cleanText(user.sector || user.fieldOfStudy || user.university || user.location) || displayLabel(role))}</div>
            <div class="details-profile-badges">
              ${badge(role, role === 'company' ? 'badge-success' : role === 'admin' ? 'badge-warning' : 'badge-info', role === 'company' ? 'building-2' : role === 'admin' ? 'shield' : 'user')}
            </div>
          </div>
        </div>
        ${bioText ? section(role === 'company' ? 'About' : 'Bio', 'align-left', `<p style="white-space:pre-wrap;margin:0;">${esc(bioText)}</p>`) : ''}
        ${section('Details', 'badge', `<div class="profile-grid">${detailRows.join('')}</div>`)}
        ${roleSection}
      `;
    }

    function publisherRoleSection(user, role) {
      if (role === 'student') {
        const academicLevel = cleanText(user.academicLevel);
        const rows = [];
        if (academicLevel) rows.push(profileBlockHtml('Academic level', capitalizeLabel(academicLevel)));
        if (cleanText(user.university)) rows.push(profileBlockHtml('University', cleanText(user.university)));
        if (cleanText(user.fieldOfStudy)) rows.push(profileBlockHtml('Field of study', cleanText(user.fieldOfStudy)));
        const isDoctorate = academicLevel.toLowerCase() === 'doctorat' || academicLevel.toLowerCase().includes('doctor');
        if (isDoctorate) {
          if (cleanText(user.researchTopic)) rows.push(profileBlockHtml('Research topic', cleanText(user.researchTopic)));
          if (cleanText(user.laboratory)) rows.push(profileBlockHtml('Laboratory', cleanText(user.laboratory)));
          if (cleanText(user.supervisor)) rows.push(profileBlockHtml('Supervisor', cleanText(user.supervisor)));
          if (cleanText(user.researchDomain)) rows.push(profileBlockHtml('Research domain', cleanText(user.researchDomain)));
        }
        return rows.length ? section('Academic', 'graduation-cap', `<div class="profile-grid">${rows.join('')}</div>`) : '';
      }

      if (role === 'company') {
        const rows = [
          profileBlockHtml('Company name', cleanText(user.companyName) || cleanText(user.fullName) || 'Not provided', { muted: !cleanText(user.companyName || user.fullName) }),
          profileBlockHtml('Sector', cleanText(user.sector || user.industry) || 'Not provided', { muted: !cleanText(user.sector || user.industry) }),
        ];
        return section('Company', 'building-2', `<div class="profile-grid">${rows.join('')}</div>`);
      }

      if (role === 'admin') {
        return '';
      }

      return '';
    }

    function profileBlockHtml(label, value, { html = false, muted = false } = {}) {
      return `<div class="profile-block"><div class="profile-block-label">${esc(label)}</div><div class="profile-block-value" style="${muted ? 'color:var(--c-text-faint);font-weight:500;' : ''}">${html ? value : esc(value)}</div></div>`;
    }

    function externalLinkHtml(value) {
      const label = cleanText(value);
      return label ? `<a href="${esc(normalizeExternalUrl(label))}" target="_blank" rel="noopener">${esc(label)}</a>` : '';
    }

    function displayNameForPublisher(user) {
      return cleanText(user.companyName || user.fullName || user.displayName || user.email || 'Publisher');
    }

    function roleColor(role) {
      if (role === 'student') return '#2563EB';
      if (role === 'company') return '#14B8A6';
      if (role === 'admin') return '#F59E0B';
      return '#64748B';
    }

    function normalizedOpportunityType(item) {
      return cleanText(item?.type || item?.opportunityType || 'job').toLowerCase();
    }

    function opportunityAmountLabel(item) {
      const type = normalizedOpportunityType(item);
      if (type === 'sponsoring') {
        if (cleanText(item?.fundingAmount)) {
          return cleanText(`${item.fundingAmount} ${item.fundingCurrency || ''}`);
        }
        return cleanText(item?.fundingNote || item?.compensationText);
      }

      const currency = cleanText(item?.salaryCurrency || item?.fundingCurrency);
      const period = cleanText(item?.salaryPeriod);
      const suffix = [currency, period ? `/${period}` : ''].filter(Boolean).join(' ');
      if (item?.salaryMin != null && item?.salaryMax != null) {
        return cleanText(`${item.salaryMin}-${item.salaryMax} ${suffix}`);
      }
      if (item?.salaryMin != null) {
        return cleanText(`${t('label.from', 'From')} ${item.salaryMin} ${suffix}`);
      }
      if (type === 'internship' && item?.isPaid === false) return t('label.unpaid', 'Unpaid');
      return cleanText(item?.compensationText || item?.compensationNote);
    }

    async function authToken() {
      return auth.currentUser ? auth.currentUser.getIdToken() : '';
    }

    async function workerRequest(path, { method = 'POST', body = null } = {}) {
      const token = await authToken();
      const response = await fetch(`${WORKER_BASE_URL}${path}`, {
        method,
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`,
        },
        body: body == null ? undefined : JSON.stringify(body),
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || data.message || `Request failed: ${response.status}`);
      }
      return data;
    }

    async function workerBestEffort(path, body) {
      try {
        await workerRequest(path, { body });
      } catch (error) {
        console.warn('Worker side effect failed:', path, error);
      }
    }

    function trainingDisplayLink(item) {
      return cleanText(item?.link || item?.url || item?.previewLink || item?.infoLink);
    }

    function trainingThumbnail(item) {
      return cleanText(item?.thumbnail || item?.thumbnailUrl || item?.coverImage || item?.image);
    }

    function trainingSourceKind(item) {
      const source = cleanText(item?.source).toLowerCase();
      const type = cleanText(item?.type).toLowerCase();
      if (source === 'youtube' || type === 'video') return 'youtube';
      if (source === 'google_books' || type === 'book') return 'books';
      return 'other';
    }

    function trainingSourceLabel(item) {
      const kind = trainingSourceKind(item);
      if (kind === 'youtube') return 'YouTube';
      if (kind === 'books') return 'Google Books';
      return capitalizeLabel(item?.source || item?.type || 'Resource');
    }

    function trainingMedia(item) {
      const thumb = trainingThumbnail(item);
      const isVideo = trainingSourceKind(item) === 'youtube';
      if (thumb) {
        return `<img src="${esc(thumb)}" alt="" loading="lazy">`;
      }
      return `<i data-lucide="${isVideo ? 'video' : 'book-open'}"></i>`;
    }

    async function loadTrainings() {
      const trainS = await getDocs(query(collection(db, 'trainings'), orderBy('createdAt', 'desc')));
      state.trainings = trainS.docs.map((s) => ({ id: s.id, ...s.data() }));
    }

    mountShell({ page: 'content' });

    const normalizedInitialTab = normalizeActiveTab(initialTabParam);
    const state = {
      activeTab: normalizedInitialTab,
      ideas: [], applications: [], opportunities: [], scholarships: [], trainings: [],
      booksResults: [], youtubeResults: [],
      librarySource: normalizeLibrarySource(getQueryParam('librarySource') || 'overview'), // overview | books | youtube
      libraryMode: normalizeLibraryMode(getQueryParam('libraryMode') || 'search'), // search | manage
      filter: normalizeFilterValue(
        normalizedInitialTab,
        getQueryParam('filter') || '',
      ),
      oppType: normalizeOpportunityType(getQueryParam('opportunityType') || 'all'),
      search: '',
    };
    if (!TABS.find((tab) => tab.id === state.activeTab)) state.activeTab = 'ideas';

    document.addEventListener('languagechange', () => {
      try { applyTranslations(document); } catch {}
      try { renderStats(); } catch {}
      try { renderTab(); } catch {}
    });

    checkAuth(async () => { await initPage(); });

    // ---------- Shell ----------
    async function initPage() {
      const root = document.getElementById('page-content');
      root.innerHTML = `
        <div id="stats-pills" class="summary-pills"></div>
        <div class="tabs" id="tab-bar">
          ${TABS.map((tab) => `<button class="tab${tab.id === state.activeTab ? ' active' : ''}" data-tab="${tab.id}"><i data-lucide="${tab.icon}"></i><span>${esc(tabLabel(tab))}</span></button>`).join('')}
        </div>
        <section class="surface-panel" id="tab-panel"></section>
      `;
      document.querySelectorAll('#tab-bar .tab').forEach((btn) => {
        btn.addEventListener('click', () => {
          state.activeTab = btn.getAttribute('data-tab');
          document.querySelectorAll('#tab-bar .tab').forEach((b) => b.classList.toggle('active', b === btn));
          state.filter = 'all';
          state.oppType = 'all';
          state.librarySource = 'overview';
          state.libraryMode = 'search';
          state.search = '';
          updateUrlParams({
            tab: state.activeTab,
            filter: '',
            opportunityType: '',
            librarySource: '',
            libraryMode: '',
            ideaId: '',
            opportunityId: '',
            scholarshipId: '',
            trainingId: '',
            applicationId: '',
          });
          renderTab();
        });
      });
      await loadAll();
      renderStats();
      renderTab();
      showPage();
      handleDeepLink();
    }

    function handleDeepLink() {
      const applicationId = getQueryParam('applicationId');
      if (applicationId) {
        const application = state.applications.find((item) => item.id === applicationId);
        const opportunity = application?.opportunityId
          ? state.opportunities.find((item) => item.id === application.opportunityId)
          : null;

        if (opportunity) {
          state.activeTab = 'opportunities';
          document.querySelectorAll('#tab-bar .tab').forEach((btn) => {
            btn.classList.toggle('active', btn.getAttribute('data-tab') === 'opportunities');
          });
          renderTab();
          requestAnimationFrame(() => openOpportunityDetails(opportunity, applicationId));
          return;
        }

        requestAnimationFrame(() => openCvViewer(applicationId));
        return;
      }

      const targets = {
        ideas:         { p: 'ideaId',         list: state.ideas,         open: (it) => { navigateTo('idea-editor?id=' + encodeURIComponent(it.id)); } },
        opportunities: { p: 'opportunityId',  list: state.opportunities, open: (it) => openOppEditor(it) },
        scholarships:  { p: 'scholarshipId',  list: state.scholarships,  open: (it) => openScholarEditor(it) },
        trainings:     { p: 'trainingId',     list: state.trainings,     open: null },
      };
      const target = targets[state.activeTab];
      if (!target) return;
      const id = getQueryParam(target.p);
      if (!id) return;
      const item = target.list.find((x) => x.id === id);
      if (!item) return;
      requestAnimationFrame(() => {
        const row = document.querySelector(`#list [data-row-id="${CSS.escape(id)}"]`);
        if (row) {
          row.style.outline = '2px solid var(--c-primary)';
          row.scrollIntoView({ behavior: 'smooth', block: 'center' });
          setTimeout(() => { row.style.outline = ''; }, 2400);
        }
      });
      if (target.open) target.open(item);
    }

    async function loadAll() {
      try {
        await workerBestEffort('/api/deadlines/expire', {});
        const [ideasS, appsS, oppsS, scholarS, trainS] = await Promise.all([
          getDocs(query(collection(db, 'projectIdeas'), orderBy('createdAt', 'desc'))),
          getDocs(query(collection(db, 'applications'), orderBy('appliedAt', 'desc'))),
          getDocs(query(collection(db, 'opportunities'), orderBy('createdAt', 'desc'))),
          getDocs(query(collection(db, 'scholarships'), orderBy('createdAt', 'desc'))),
          getDocs(query(collection(db, 'trainings'), orderBy('createdAt', 'desc'))),
        ]);
        state.ideas         = ideasS.docs.map((s) => ({ id: s.id, ...s.data() }));
        state.applications  = appsS.docs.map((s) => ({ id: s.id, ...s.data() }));
        state.opportunities = oppsS.docs.map((s) => ({ id: s.id, ...s.data() }));
        state.scholarships  = scholarS.docs.map((s) => ({ id: s.id, ...s.data() }));
        state.trainings     = trainS.docs.map((s) => ({ id: s.id, ...s.data() }));
      } catch (e) {
        console.error(e);
        const panel = document.getElementById('tab-panel');
        if (panel) panel.innerHTML = feedbackCardHtml(t('mod.couldNotLoadContent', 'Could not load content.'), { type: 'error' });

    }

    // ---------- Stats ----------
    function renderStats() {
      const el = document.getElementById('stats-pills');
      if (!el) return;
      const pendingIdeas = state.ideas.filter((x) => (x.status || 'pending') === 'pending').length;
      const adminId = activeAdminId();
      const oppMap = new Map(state.opportunities.map((item) => [item.id, item]));
      const pendingApps = state.applications.filter((item) => {
        const opportunity = oppMap.get(item.opportunityId);
        return (item.status || 'pending') === 'pending' &&
          !!opportunity &&
          String(opportunity.createdByRole || '').trim().toLowerCase() === 'admin' &&
          String(opportunity.companyId || '').trim() === adminId;
      }).length;
      const opps = state.opportunities.length;
      const scholarships = state.scholarships.length;
      const resources = state.trainings.length;
      el.innerHTML = `
        <span class="summary-pill is-primary"><i data-lucide="lightbulb"></i><strong>${state.ideas.length}</strong> ${esc(t('plural.ideas', 'ideas'))}</span>
        ${pendingIdeas ? `<span class="summary-pill is-warning"><i data-lucide="clock"></i><strong>${pendingIdeas}</strong> ${esc(t('mod.pill.pendingIdeas', 'Pending Ideas'))}</span>` : ''}
        ${pendingApps ? `<span class="summary-pill is-danger"><i data-lucide="hourglass"></i><strong>${pendingApps}</strong> ${esc(t('mod.pill.pendingApps', 'Pending Apps'))}</span>` : ''}
        <span class="summary-pill is-info"><i data-lucide="briefcase"></i><strong>${opps}</strong> ${esc(t('plural.opportunities', 'opportunities'))}</span>
        <span class="summary-pill"><i data-lucide="graduation-cap"></i><strong>${scholarships}</strong> ${esc(t('plural.scholarships', 'scholarships'))}</span>
        <span class="summary-pill is-success"><i data-lucide="book-open"></i><strong>${resources}</strong> ${esc(t('plural.resources', 'resources'))}</span>
      `;
      if (window.lucide) window.lucide.createIcons();
    }

    // ---------- Tabs ----------
    function renderTab() {
      const panel = document.getElementById('tab-panel');
      switch (state.activeTab) {
        case 'ideas':         return renderIdeasTab(panel);
        case 'opportunities': return renderOppsTab(panel);
        case 'scholarships':  return renderScholarsTab(panel);
        case 'trainings':     return renderTrainingsTab(panel);
      }
    }

    // ---------- Shared bits ----------
    function chipFilterBar(tab, counts = {}) {
      const chips = FILTERS[tab] || [];
      return `
        <div class="chip-row">
          <div class="chip-group">
            ${chips.map((c) => {
              const count = counts[c.v];
              const countHtml = Number.isFinite(Number(count))
                ? `<span class="badge" style="margin-left:2px;">${Number(count).toLocaleString()}</span>`
                : '';
              return `<button class="chip${state.filter===c.v?' active':''}" data-filter-value="${c.v}">${c.i?`<i data-lucide="${c.i}"></i>`:''}${esc(chipLabel(c))}${countHtml}</button>`;
            }).join('')}
          </div>
        </div>`;
    }
    function searchBar(placeholder) {
      const ph = placeholder || t('mod.searchPlaceholder', 'Search...');
      return `<div class="filter-bar">
        <div class="search-bar" style="flex:1;"><i data-lucide="search"></i><input id="search" type="search" placeholder="${esc(ph)}" value="${esc(state.search)}"/></div>
      </div>`;
    }
    function bindCommon() {
      document.querySelectorAll('[data-filter-value]').forEach((b) => {
        b.addEventListener('click', () => { state.filter = b.getAttribute('data-filter-value'); renderTab(); });
      });
      const s = document.getElementById('search');
      if (s) s.addEventListener('input', (e) => { state.search = e.target.value; renderTab(); });
      bindPublisherActions(document.getElementById('tab-panel') || document);
    }
    function matchesQuery(x, fields) {
      const q = state.search.trim();
      if (!q) return true;
      return matchesSearch(fields, q);
    }
    function bindRowActions(handler) {
      document.getElementById('list')?.querySelectorAll('[data-action]').forEach((btn) => {
        btn.addEventListener('click', () => handler(btn.getAttribute('data-id'), btn.getAttribute('data-action')));
      });
    }
    function truncate(s, n) { return s && s.length > n ? s.slice(0, n - 1) + '…' : s; }
    function toDateInput(value) {
      const d = value?.toDate ? value.toDate() : (value?.seconds ? new Date(value.seconds * 1000) : (value instanceof Date ? value : null));
      if (!d) return '';
      return d.toISOString().slice(0, 10);
    }
    function splitLines(s) { return String(s || '').split(/\r?\n/).map((x) => x.trim()).filter(Boolean); }
    function splitCsv(s) { return String(s || '').split(',').map((x) => x.trim()).filter(Boolean); }
    function joinLines(arr) { return Array.isArray(arr) ? arr.join('\n') : ''; }
    function joinCsv(arr) { return Array.isArray(arr) ? arr.join(', ') : ''; }
    function section(title, icon, innerHtml) {
      return `<div class="profile-section">
        <div class="profile-section__title"><i data-lucide="${icon}"></i>${esc(title)}</div>
        ${innerHtml}
      </div>`;
    }

    // =============== IDEAS ===============
    function normalizedIdeaStatus(status) {
      const normalized = cleanText(status || 'pending').toLowerCase();
      return ['pending', 'approved', 'rejected'].includes(normalized) ? normalized : 'pending';
    }

    function ideaStatusRank(status) {
      const normalized = normalizedIdeaStatus(status);
      if (normalized === 'pending') return 0;
      if (normalized === 'approved') return 1;
      if (normalized === 'rejected') return 2;
      return 3;
    }

    function compareIdeasForAdmin(a, b) {
      const statusDelta = ideaStatusRank(a.status) - ideaStatusRank(b.status);
      if (statusDelta) return statusDelta;
      const hiddenDelta = (a.isHidden ? 1 : 0) - (b.isHidden ? 1 : 0);
      if (hiddenDelta) return hiddenDelta;
      const aTime = timestampToDate(a.updatedAt || a.createdAt)?.getTime() || 0;
      const bTime = timestampToDate(b.updatedAt || b.createdAt)?.getTime() || 0;
      return bTime - aTime;
    }

    function renderIdeasTab(panel) {
      const searchItems = state.ideas
        .slice()
        .sort(compareIdeasForAdmin)
        .filter((x) => matchesQuery(x, [x.title, x.tagline, x.shortDescription, x.description, x.domain, x.category, x.level, x.tools, x.status, x.submittedBy, x.submittedByName]));
      const counts = {
        all: searchItems.length,
        admin: searchItems.filter((x) => isOwnAdminIdea(x)).length,
        pending: searchItems.filter((x) => normalizedIdeaStatus(x.status) === 'pending').length,
        approved: searchItems.filter((x) => normalizedIdeaStatus(x.status) === 'approved').length,
        rejected: searchItems.filter((x) => normalizedIdeaStatus(x.status) === 'rejected').length,
        hidden: searchItems.filter((x) => x.isHidden === true).length,
      };
      const totalPending = state.ideas.filter((x) => normalizedIdeaStatus(x.status) === 'pending').length;
      let items = searchItems;
      if (state.filter === 'admin')    items = items.filter((x) => isOwnAdminIdea(x));
      if (state.filter === 'pending')  items = items.filter((x) => normalizedIdeaStatus(x.status) === 'pending');
      if (state.filter === 'approved') items = items.filter((x) => normalizedIdeaStatus(x.status) === 'approved');
      if (state.filter === 'rejected') items = items.filter((x) => normalizedIdeaStatus(x.status) === 'rejected');
      if (state.filter === 'hidden')   items = items.filter((x) => x.isHidden === true);

      panel.innerHTML = `
        ${totalPending ? feedbackCardHtml('Pending ideas need approve or reject decisions before they count as reviewed content.', { type: 'warning', title: `${totalPending} pending idea${totalPending === 1 ? '' : 's'}` }) : ''}
        ${chipFilterBar('ideas', counts)}
        ${searchBar('Search ideas...')}
        <div style="display:flex; justify-content:flex-end; margin-bottom:12px;">
          <button class="btn btn-primary" id="new-idea"><i data-lucide="plus"></i>New idea</button>
        </div>
        <div class="list-grid" id="list">${items.length ? items.map(renderIdeaRow).join('') : emptyStateHtml('Try a different filter.', { title: 'No project ideas', icon: 'lightbulb' })}</div>
      `;
      bindCommon();
      document.getElementById('new-idea').addEventListener('click', () => { navigateTo('idea-editor'); });
      bindRowActions((id, action) => handleIdeaAction(id, action));
      bindCardOpens((id, action) => handleIdeaAction(id, action));
      if (window.lucide) window.lucide.createIcons();
    }

    function renderIdeaRow(it) {
      const status = normalizedIdeaStatus(it.status);
      const canEdit = isOwnAdminIdea(it);
      return contentCard({
        id: it.id,
        tone: 'idea',
        icon: 'lightbulb',
        title: it.title || 'Untitled idea',
        subtitle: [it.domain, it.academicLevel || it.level].filter(Boolean).join(' • '),
        description: it.tagline || it.shortDescription || it.description || '',
        badges: [
          badge(status, `badge-${statusBadgeClass(status)}`),
          it.isHidden ? badge('Hidden', 'badge-danger', 'eye-off') : '',
          it.domain ? badge(it.domain, '', 'tag') : '',
          it.submittedByName ? badge(it.submittedByName, '', 'user') : '',
        ],
        meta: formatTimestamp(it.createdAt) || '',
        actions: [
          status === 'pending' ? iconAction(it.id, 'approve', 'check', 'Approve', 'btn-success') : '',
          status === 'pending' ? iconAction(it.id, 'reject', 'x', 'Reject', 'btn-danger') : '',
          iconAction(it.id, 'toggle-hide', it.isHidden ? 'eye' : 'eye-off', it.isHidden ? 'Show idea' : 'Hide idea'),
          canEdit ? iconAction(it.id, 'edit', 'pencil', 'Edit idea') : '',
          iconAction(it.id, 'delete', 'trash-2', 'Delete idea', 'btn-danger'),
        ],
        footerActions: [
          profileLinkAction(it.submittedBy, 'Publisher profile'),
        ],
      });
    }

    async function handleIdeaAction(id, action) {
      const ref = doc(db, 'projectIdeas', id);
      const it = state.ideas.find((x) => x.id === id);
      if (!it) return;
      try {
        if (action === 'details') {
          openIdeaDetails(it);
          return;
        }
        if (action === 'approve') {
          await updateDoc(ref, { status: 'approved' });
          it.status = 'approved';
          await logAdminActivity({
            type: 'project_idea',
            action: 'project_idea_approved',
            targetCollection: 'projectIdeas',
            targetId: id,
            title: it.title || 'Project idea',
            description: `Project idea "${it.title || 'Untitled'}" was approved.`,
            subjectId: it.submittedBy || '',
            subjectName: it.submittedByName || '',
            status: 'approved',
          });
          await workerBestEffort('/api/notify/idea-status-changed', { ideaId: id });
          showToast(t('toast.ideaApproved', 'Idea Approved.'), 'success');
        } else if (action === 'reject') {
          await updateDoc(ref, { status: 'rejected' });
          it.status = 'rejected';
          await logAdminActivity({
            type: 'project_idea',
            action: 'project_idea_rejected',
            targetCollection: 'projectIdeas',
            targetId: id,
            title: it.title || 'Project idea',
            description: `Project idea "${it.title || 'Untitled'}" was rejected.`,
            subjectId: it.submittedBy || '',
            subjectName: it.submittedByName || '',
            status: 'rejected',
          });
          await workerBestEffort('/api/notify/idea-status-changed', { ideaId: id });
          showToast(t('toast.ideaRejected', 'Idea Rejected.'), 'success');
        } else if (action === 'toggle-hide') {
          const next = !it.isHidden;
          await updateDoc(ref, { isHidden: next, updatedAt: serverTimestamp() });
          it.isHidden = next;
          await logAdminActivity({
            type: 'project_idea',
            action: next ? 'project_idea_hidden' : 'project_idea_shown',
            targetCollection: 'projectIdeas',
            targetId: id,
            title: it.title || 'Project idea',
            description: `Project idea "${it.title || 'Untitled'}" was ${next ? 'hidden' : 'shown'}.`,
            subjectId: it.submittedBy || '',
            subjectName: it.submittedByName || '',
            status: next ? 'hidden' : 'visible',
          });
          showToast(next ? t('toast.ideaHidden', 'Idea hidden.') : t('toast.ideaVisible', 'Idea visible again.'), 'success');
        } else if (action === 'edit') {
          if (!isOwnAdminIdea(it)) {
            showToast(t('toast.canEditOwnIdea', 'You can only edit ideas you posted as admin.'), 'warning');
            return;
          }
          navigateTo('idea-editor?id=' + encodeURIComponent(id));
          return;
        } else if (action === 'delete') {
          if (!confirm('Delete this idea?')) return;
          await deleteDoc(ref);
          state.ideas = state.ideas.filter((x) => x.id !== id);
          await logAdminActivity({
            type: 'project_idea',
            action: 'project_idea_deleted',
            targetCollection: 'projectIdeas',
            targetId: id,
            title: it.title || 'Project idea deleted',
            description: `Project idea "${it.title || 'Untitled'}" was deleted.`,
            subjectId: it.submittedBy || '',
            subjectName: it.submittedByName || '',
            status: 'deleted',
          });
          showToast(t('toast.ideaDeleted', 'Idea deleted.'), 'success');
        }
        renderStats();
        renderTab();
      } catch (e) {
        console.error(e);
        showToast(t('toast.actionFailed', 'Action failed.'), 'error');
      }
    }

          </div>
          <div class="detail-metrics">
            ${detailMetric('Status', capitalizeLabel(it.status || 'pending'))}

    // =============== OPPORTUNITIES ===============
    function isLatest(it) {
      const d = it.createdAt?.toDate ? it.createdAt.toDate() : (it.createdAt?.seconds ? new Date(it.createdAt.seconds * 1000) : null);
      if (!d) return false;
      return (Date.now() - d.getTime()) < 30 * 24 * 3600 * 1000;
    }
    function oppPendingAppsCount(oppId) {
      return state.applications.filter((a) => a.opportunityId === oppId && applicationStatus(a.status) === 'pending').length;
    }

    function renderOppsTab(panel) {
      const allItems = state.opportunities
        .slice()
        .sort((a, b) => {
          const aTime = timestampToDate(a.updatedAt || a.createdAt)?.getTime() || 0;
          const bTime = timestampToDate(b.updatedAt || b.createdAt)?.getTime() || 0;
          if (bTime !== aTime) {
            return bTime - aTime;
          }
          return String(a.title || '').localeCompare(String(b.title || ''), undefined, { sensitivity: 'base' });
        })
        .filter((x) => matchesQuery(x, [x.title, x.companyName, x.location, x.type, x.status, x.description, opportunityAmountLabel(x), x.workMode, x.employmentType]));
      const pendingManageableApps = state.applications.filter((application) => {
        const opportunity = state.opportunities.find((item) => item.id === application.opportunityId);
        return opportunity && canEditOpportunity(opportunity) && applicationStatus(application.status) === 'pending';
      }).length;
      const counts = {
        all: allItems.length,
        admin: allItems.filter((x) => isAdminOpportunity(x)).length,
        pendingApps: allItems.filter((x) => canEditOpportunity(x) && oppPendingAppsCount(x.id) > 0).length,
        featured: allItems.filter((x) => x.isFeatured === true).length,
        closed: allItems.filter((x) => opportunityEffectiveStatus(x) === 'closed').length,
        hidden: allItems.filter((x) => x.isHidden === true).length,
      };
      let items = allItems;
      if (state.filter === 'admin')      items = items.filter((x) => isAdminOpportunity(x));
      if (state.filter === 'pendingApps')items = items.filter((x) => canEditOpportunity(x) && oppPendingAppsCount(x.id) > 0);
      if (state.filter === 'featured')   items = items.filter((x) => x.isFeatured === true);
      if (state.filter === 'closed')     items = items.filter((x) => opportunityEffectiveStatus(x) === 'closed');
      if (state.filter === 'hidden')     items = items.filter((x) => x.isHidden === true);
      if (state.oppType && state.oppType !== 'all') {
        items = items.filter((x) => normalizedOpportunityType(x) === state.oppType);
      }

      const typeChips = FILTERS.opportunityTypes || [];
      const typeBase = allItems
        .filter((x) => {
          if (state.filter === 'admin') return isAdminOpportunity(x);
          if (state.filter === 'pendingApps') return canEditOpportunity(x) && oppPendingAppsCount(x.id) > 0;
          if (state.filter === 'featured') return x.isFeatured === true;
          if (state.filter === 'closed') return opportunityEffectiveStatus(x) === 'closed';
          if (state.filter === 'hidden') return x.isHidden === true;
          return true;
        });
      const typeCounts = {
        all: typeBase.length,
        job: typeBase.filter((x) => normalizedOpportunityType(x) === 'job').length,
        internship: typeBase.filter((x) => normalizedOpportunityType(x) === 'internship').length,
        sponsoring: typeBase.filter((x) => normalizedOpportunityType(x) === 'sponsoring').length,
      };

      panel.innerHTML = `
        ${pendingManageableApps ? feedbackCardHtml('Review applicants, CVs, and pending decisions for opportunities you posted as admin.', { type: 'warning', title: `${pendingManageableApps} pending application${pendingManageableApps === 1 ? '' : 's'}` }) : ''}
        ${chipFilterBar('opportunities', counts)}
        <div class="chip-row" style="margin-top:-4px;">
          <div class="chip-group">
            ${typeChips.map((c) => `<button class="chip${state.oppType===c.v?' active':''}" data-opptype="${c.v}"><i data-lucide="${c.i}"></i>${esc(c.l)}<span class="badge" style="margin-left:2px;">${Number(typeCounts[c.v] || 0).toLocaleString()}</span></button>`).join('')}
          </div>
        </div>
        ${searchBar('Search by title, company, location...')}
        <div style="display:flex; justify-content:flex-end; margin-bottom:12px;">
          <button class="btn btn-primary" id="new-opp"><i data-lucide="plus"></i>New opportunity</button>
        </div>
        <div class="list-grid" id="list">${items.length ? items.map(renderOpportunityRow).join('') : emptyStateHtml('Nothing to show here yet.', { title: 'No opportunities', icon: 'briefcase' })}</div>
      `;
      bindCommon();
      document.querySelectorAll('[data-opptype]').forEach((b) => {
        b.addEventListener('click', () => { state.oppType = b.getAttribute('data-opptype'); renderTab(); });
      });
      document.getElementById('new-opp').addEventListener('click', () => { navigateTo('opp-editor'); });
      bindRowActions((id, action) => handleOpportunityAction(id, action));
      bindCardOpens((id, action) => handleOpportunityAction(id, action));
      if (window.lucide) window.lucide.createIcons();
    }

    function renderOpportunityRow(it) {
      const applications = applicationsForOpportunity(it.id);
      const pendingCount = applications.filter((item) => applicationStatus(item.status) === 'pending').length;
      const type = it.type || it.opportunityType || '';
      const effectiveStatus = opportunityEffectiveStatus(it);
      const canEdit = canEditOpportunity(it);
      const amountLabel = opportunityAmountLabel(it);
      return contentCard({
        id: it.id,
        tone: type === 'internship' ? 'internship' : type === 'sponsoring' ? 'scholarship' : 'opportunity',
        icon: type === 'internship' ? 'briefcase-business' : type === 'sponsoring' ? 'badge-dollar-sign' : 'briefcase',
        title: it.title || 'Untitled',
        subtitle: [it.companyName, it.location, capitalizeLabel(type)].filter(Boolean).join(' • '),
        description: it.description || '',
        badges: [
          badge(effectiveStatus, `badge-${statusBadgeClass(effectiveStatus)}`),
          it.isFeatured ? badge('Featured', 'badge-warning', 'star') : '',
          it.isHidden ? badge('Hidden', 'badge-danger', 'eye-off') : '',
          pendingCount ? badge(`${pendingCount} pending`, 'badge-info', 'hourglass') : '',
          it.workMode ? badge(capitalizeLabel(it.workMode), '', 'map-pinned') : '',
        ],
        meta: formatTimestamp(it.updatedAt || it.createdAt) || '',
        actions: [
          iconAction(it.id, 'toggle-hide', it.isHidden ? 'eye' : 'eye-off', it.isHidden ? 'Show opportunity' : 'Hide opportunity'),
          canEdit ? iconAction(it.id, 'edit', 'pencil', 'Edit opportunity') : '',
          iconAction(it.id, 'delete', 'trash-2', 'Delete opportunity', 'btn-danger'),
        ],
        footerActions: [
          applications.length ? textAction(it.id, 'applications', 'assignment', `${applications.length} Apps`, 'btn-primary') : '',
          profileLinkAction(it.companyId, 'Publisher profile'),
          amountLabel
            ? `<span class="content-card__footer-note"><i data-lucide="${type === 'sponsoring' ? 'coins' : 'wallet'}"></i>${esc(amountLabel)}</span>`

    function applicationCardHtml(application, { canManage = false, focus = false, includeOpportunity = false } = {}) {
      const status = applicationStatus(application.status);
      const statusClass = status === 'accepted' ? 'success' : status === 'rejected' ? 'danger' : status === 'withdrawn' ? 'danger' : 'warning';
      const opportunity = includeOpportunity
        ? state.opportunities.find((item) => item.id === application.opportunityId)
        : null;
      return `<div class="item-row${focus ? ' card-highlight' : ''}" data-app-row-id="${esc(application.id)}">
        <div class="activity-icon" style="background:rgba(59,34,246,0.14);color:#3B22F6"><i data-lucide="user"></i></div>
        <div class="row-body">
          <div class="row-title">${esc(application.studentName || application.studentId || 'Applicant')}</div>
          <div class="row-sub">${includeOpportunity ? esc(opportunity?.title || application.opportunityTitle || 'Opportunity') + ' • ' : ''}Applied ${esc(formatTimestamp(application.appliedAt) || '-')}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;">
            <span class="badge badge-${statusClass}">${esc(displayLabel(status))}</span>
            ${application.coverLetter ? badge('Cover letter', '', 'message-square') : ''}
          </div>
        </div>
        <div class="row-actions">
          <button class="btn btn-sm" data-app="${esc(application.id)}" data-app-action="review"><i data-lucide="panel-top-open"></i>Review</button>
          ${application.studentId ? `<button class="btn btn-sm" data-app="${esc(application.id)}" data-app-action="profile"><i data-lucide="user"></i>Profile</button>` : ''}
          <button class="btn btn-sm" data-app="${esc(application.id)}" data-app-action="cv"><i data-lucide="file-text"></i>CV</button>
          ${canManage && status === 'pending' ? `<button class="btn btn-sm btn-success" data-app="${esc(application.id)}" data-app-action="accept"><i data-lucide="check"></i>Approve</button>` : ''}
          ${canManage && status === 'pending' ? `<button class="btn btn-sm btn-danger" data-app="${esc(application.id)}" data-app-action="reject"><i data-lucide="x"></i>Reject</button>` : ''}
        </div>
      </div>`;
    }

    async function updateApplicationDecision(application, opportunity, nextStatus) {
      await updateDoc(doc(db, 'applications', application.id), { status: nextStatus });
      const appObj = state.applications.find((item) => item.id === application.id);
      if (appObj) appObj.status = nextStatus;
      await logAdminActivity({
        type: 'application',
        action: `application_${nextStatus}`,
        targetCollection: 'applications',
        targetId: application.id,
        title: opportunity?.title || application.opportunityTitle || 'Application decision',
        description: `${application.studentName || 'Student'} was ${nextStatus} for ${opportunity?.title || application.opportunityTitle || 'an admin opportunity'}.`,
        subjectId: application.studentId || '',
        subjectName: application.studentName || 'Student',
        status: nextStatus,
        metadata: { opportunityId: opportunity?.id || application.opportunityId || '', opportunityTitle: opportunity?.title || application.opportunityTitle || '' },
      });
      await workerBestEffort('/api/notify/application-status-changed', { applicationId: application.id });
    }

    function bindApplicationActions(root, opportunity, refresh) {
      root.querySelectorAll('[data-app-action]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const appId = btn.getAttribute('data-app');
          const action = btn.getAttribute('data-app-action');
          const application = state.applications.find((item) => item.id === appId);
          if (!application) return;
          const actionOpportunity = opportunity?.id === application.opportunityId
            ? opportunity
            : (state.opportunities.find((item) => item.id === application.opportunityId) || opportunity || {});
          if (action === 'cv') {
            openCvViewer(appId);
            return;
          }
          if (action === 'profile') {
            openPublisherProfile(application.studentId);
            return;
          }
          if (action === 'review') {
            openApplicantQuickActions(application, actionOpportunity);
            return;
          }
          if (action === 'all-apps') {
            openStudentApplications(application.studentId, application.studentName);
            return;
          }
          if (action !== 'accept' && action !== 'reject') return;
          if (!canEditOpportunity(actionOpportunity)) {
            showToast(t('toast.canEditOwnApp', 'You can only update applications for opportunities you posted as admin.'), 'warning');
            return;
          }
          try {
            const nextStatus = action === 'accept' ? 'accepted' : 'rejected';
            await updateApplicationDecision(application, actionOpportunity, nextStatus);
            showToast(t('status.' + String(nextStatus).toLowerCase(), displayLabel(nextStatus)) + '.', 'success');
            if (typeof refresh === 'function') refresh(appId);
          } catch (e) {
            console.error(e);
            showToast(t('toast.actionFailed', 'Action failed') + ': ' + (e?.message || e), 'error');
          }
        });
      });
    }

      const saveBtn = document.getElementById('editor-save');

      if (!item) return;
      try {
        if (action === 'toggle-hide') {

          item.isHidden = next;
          await logAdminActivity({
            type: 'opportunity',

        .sort((a, b) => {

          const bHidden = b.isHidden === true ? 1 : 0;

            return aHidden - bHidden;
          }
          const aFeatured = scholarshipFeatured(a) ? 1 : 0;

          if (aFeatured !== bFeatured) {
            return bFeatured - aFeatured;
          }
          const aDeadline = timestampToDate(a.deadline)?.getTime() || Number.MAX_SAFE_INTEGER;
          const bDeadline = timestampToDate(b.deadline)?.getTime() || Number.MAX_SAFE_INTEGER;
          if (aDeadline !== bDeadline) {
            return aDeadline - bDeadline;
          }
          const aTime = timestampToDate(a.createdAt)?.getTime() || 0;
          const bTime = timestampToDate(b.createdAt)?.getTime() || 0;
          return bTime - aTime;

    function trainingSort(a, b) {
      const hiddenDelta = (a.isHidden ? 1 : 0) - (b.isHidden ? 1 : 0);
      if (hiddenDelta) return hiddenDelta;
      const approvalDelta = (a.isApproved === false ? 0 : 1) - (b.isApproved === false ? 0 : 1);
      if (approvalDelta) return approvalDelta;
      const featuredDelta = (b.isFeatured ? 1 : 0) - (a.isFeatured ? 1 : 0);
      if (featuredDelta) return featuredDelta;
      const da = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : 0;
      const db_ = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : 0;
      return db_ - da;
    }

            <select id="lib-domain"><option value="">Any domain</option>${domains.map((d) => `<option>${d}</option>`).join('')}</select>
            <select id="lib-level"><option value="">Any level</option>${levels.map((l) => `<option value="${l}">${capitalizeLabel(l)}</option>`).join('')}</select>
            <select id="lib-lang"><option value="">Any language</option><option value="fr">FR</option><option value="en">EN</option><option value="ar">AR</option></select>
            <button class="btn btn-primary" id="lib-search-btn"><i data-lucide="search"></i>Search</button>
          </div>
          <div id="lib-results" class="import-grid"></div>
        `;
        const run = () => (kind === 'books' ? runBooks() : runYoutube());
        document.getElementById('lib-search-btn').addEventListener('click', run);
        document.getElementById('lib-q').addEventListener('keydown', (e) => { if (e.key === 'Enter') run(); });
      }
      if (window.lucide) window.lucide.createIcons();
    }

    function renderLibraryManage(kind, container) {
      const items = state.trainings
        .filter((item) => trainingSourceKind(item) === kind)
        .sort(trainingSort);
      container.innerHTML = items.length
        ? `<div class="list-grid" id="list">${items.map(renderManagedTrainingRow).join('')}</div>`
        : emptyStateHtml('Import a few resources first, then manage them here.', { title: 'Nothing to manage yet', icon: kind === 'books' ? 'book-open' : 'video' });
      bindRowActions((id, action) => handleManagedTrainingAction(id, action));
      bindCardOpens((id, action) => handleManagedTrainingAction(id, action));
      if (window.lucide) window.lucide.createIcons();
    }

    function renderManagedTrainingRow(it) {
      return contentCard({
        id: it.id,
        tone: trainingSourceKind(it) === 'youtube' ? 'video' : 'resource',
        mediaHtml: trainingMedia(it),
        title: it.title || 'Untitled',
        subtitle: [it.provider, trainingSourceLabel(it), it.domain].filter(Boolean).join(' • '),
        description: it.description || '',
        badges: [
          it.level ? badge(it.level) : '',
          it.language ? badge(String(it.language).toUpperCase(), '', 'languages') : '',
          it.isFeatured ? badge('Featured', 'badge-warning', 'star') : '',
          it.isHidden ? badge('Hidden', 'badge-danger', 'eye-off') : '',
        ],
        meta: formatTimestamp(it.createdAt) || '',
        actions: [
          trainingDisplayLink(it) ? externalLinkAction(trainingDisplayLink(it), 'external-link', 'Open source') : '',
          iconAction(it.id, 'toggle-feature', 'star', it.isFeatured ? 'Remove featured' : 'Feature resource'),
          iconAction(it.id, 'delete', 'trash-2', 'Delete resource', 'btn-danger'),
        ],
      });
    }

    async function handleManagedTrainingAction(id, action) {
      const item = state.trainings.find((entry) => entry.id === id);
      if (!item) return;
      try {
        if (action === 'details') {
          openTrainingDetails(item);
          return;
        }
        if (action === 'toggle-feature') {
          const next = !item.isFeatured;
          await workerRequest(`/api/trainings/${encodeURIComponent(id)}/featured`, { body: { isFeatured: next } });
          item.isFeatured = next;
          showToast(next ? t('toast.featured', 'Featured.') : t('toast.unfeatured', 'Unfeatured.'), 'success');
        } else if (action === 'delete') {
          if (!confirm('Delete this resource?')) return;
          await workerRequest(`/api/trainings/${encodeURIComponent(id)}`, { method: 'DELETE' });
          state.trainings = state.trainings.filter((entry) => entry.id !== id);
          showToast(t('toast.resourceDeleted', 'Resource deleted.'), 'success');
        }
        renderStats();
        renderImportPanel(state.librarySource);
      } catch (e) {
        console.error(e);
        showToast(t('toast.actionFailed', 'Action failed.'), 'error');
      }
    }

    function importMeta() {
      return {
        domain: document.getElementById('lib-domain')?.value || '',
        level: document.getElementById('lib-level')?.value || 'general',
        language: document.getElementById('lib-lang')?.value || '',
      };
    }

    async function runBooks() {
      const q = document.getElementById('lib-q').value.trim();
      const results = document.getElementById('lib-results');
      if (!q) { results.innerHTML = ''; return; }
      results.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      try {
        const meta = importMeta();
        const response = await workerRequest('/api/search/google-books', {
          body: { query: q, maxResults: 12, langRestrict: meta.language || '' },
        });
        const items = response.items || [];
        if (!items.length) {
          results.innerHTML = emptyStateHtml('Try different keywords.', { title: 'No books found', icon: 'book' });
          if (window.lucide) window.lucide.createIcons();
          return;
        }
        state.booksResults = items;
        results.innerHTML = items.map((book, index) => `
          <div class="import-card">
            <div class="import-card-thumb">${book.thumbnail ? `<img src="${esc(book.thumbnail)}" alt=""/>` : `<i data-lucide="book" class="placeholder"></i>`}</div>
            <div class="import-card-body">
              <div class="import-card-title">${esc(book.title || 'Untitled')}</div>
              <div class="import-card-meta">${esc((book.authors || []).join(', ') || '—')}</div>
            </div>
            <div class="import-card-footer">
              ${book.previewLink ? `<a class="btn btn-sm" href="${esc(book.previewLink)}" target="_blank" rel="noopener"><i data-lucide="external-link"></i></a>` : ''}
              <button class="btn btn-sm btn-primary" data-import-book="${index}" style="margin-left:auto;"><i data-lucide="download"></i>Import</button>
            </div>
          </div>`).join('');
        results.querySelectorAll('[data-import-book]').forEach((button) => {
          button.addEventListener('click', () => importBook(state.booksResults[Number(button.getAttribute('data-import-book'))]));
        });
        if (window.lucide) window.lucide.createIcons();
      } catch (e) {
        console.error(e);
        results.innerHTML = feedbackCardHtml('Search failed. Try again later.', { type: 'error' });
        if (window.lucide) window.lucide.createIcons();
      }
    }

    async function importBook(book) {
      try {
        const meta = importMeta();
        if (!meta.domain) {
          showToast(t('toast.chooseDomain', 'Choose a domain before importing.'), 'warning');
          return;
        }
        await workerRequest('/api/trainings/import/google-book', {
          body: {
            selectedBook: book,
            domain: meta.domain,
            level: meta.level,
            languageOverride: meta.language,
            isFeatured: false,
          },
        });
        await loadTrainings();
        renderStats();
        renderImportPanel('books');
        showToast(t('toast.bookImported', 'Book imported to library.'), 'success');
      } catch (e) {
        console.error(e);
        showToast(e?.message || t('toast.importFailed', 'Import failed.'), 'error');
      }
    }

    async function runYoutube() {
      const q = document.getElementById('lib-q').value.trim();
      const results = document.getElementById('lib-results');
      if (!q) { results.innerHTML = ''; return; }
      results.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      try {
        const meta = importMeta();
        const response = await workerRequest('/api/search/youtube', {
          body: { query: q, maxResults: 12, language: meta.language || '' },
        });
        const items = response.items || [];
        if (!items.length) {
          results.innerHTML = emptyStateHtml('Try different keywords.', { title: 'No videos found', icon: 'video-off' });
          if (window.lucide) window.lucide.createIcons();
          return;
        }
        state.youtubeResults = items;
        results.innerHTML = items.map((video, index) => `
          <div class="import-card">
            <div class="import-card-thumb">${video.thumbnail ? `<img src="${esc(video.thumbnail)}" alt=""/>` : `<i data-lucide="video" class="placeholder"></i>`}</div>
            <div class="import-card-body">
              <div class="import-card-title">${esc(video.title || 'Untitled')}</div>
              <div class="import-card-meta">${esc(video.channelTitle || video.provider || '—')}</div>
            </div>
            <div class="import-card-footer">
              ${video.url || video.link ? `<a class="btn btn-sm" href="${esc(video.url || video.link)}" target="_blank" rel="noopener"><i data-lucide="play"></i></a>` : ''}
              <button class="btn btn-sm btn-primary" data-import-vid="${index}" style="margin-left:auto;"><i data-lucide="download"></i>Import</button>
            </div>
          </div>`).join('');
        results.querySelectorAll('[data-import-vid]').forEach((button) => {
          button.addEventListener('click', () => importVideo(state.youtubeResults[Number(button.getAttribute('data-import-vid'))]));
        });
        if (window.lucide) window.lucide.createIcons();
      } catch (e) {
        console.error(e);
        results.innerHTML = feedbackCardHtml('Search failed. Try again later.', { type: 'error' });
        if (window.lucide) window.lucide.createIcons();
      }
    }

    async function importVideo(video) {
      try {
        const meta = importMeta();
        if (!meta.domain) {
          showToast(t('toast.chooseDomain', 'Choose a domain before importing.'), 'warning');
          return;
        }
        if (!meta.language) {
          showToast(t('toast.chooseLanguageYt', 'Choose a language before importing a YouTube resource.'), 'warning');
          return;
        }
        await workerRequest('/api/trainings/import/youtube-video', {
          body: {
            selectedVideo: video,
            domain: meta.domain,
            level: meta.level,
            language: meta.language,
            isFeatured: false,
          },
        });
        await loadTrainings();
        renderStats();
        renderImportPanel('youtube');
        showToast(t('toast.videoImported', 'Video imported to library.'), 'success');
      } catch (e) {
        console.error(e);
        showToast(e?.message || t('toast.importFailed', 'Import failed.'), 'error');
      }
    }

    // =============== APPLICATION CV ===============
    async function openCvViewer(applicationId) {
      openModal('cv-modal');
      const body = document.getElementById('cv-body');
      body.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      try {
        const cv = await getApplicationCv(applicationId);
        if (!cv) { body.innerHTML = emptyStateHtml('No CV is attached to this application.', { title: 'No CV', icon: 'file-x' }); if (window.lucide) window.lucide.createIcons(); return; }
        const primaryDocument = resolvePrimaryDocumentFields(cv);
        const builtDocument = resolveBuiltDocumentFields(cv);
        const cvActions = [];
        if (primaryDocument.isAvailable) {
          cvActions.push(
            `<button class="btn" id="open-uploaded" ${primaryDocument.isPdf === false ? 'disabled title="Preview requires a PDF file"' : ''}><i data-lucide="file"></i>Open uploaded CV</button>`,
          );
          cvActions.push('<button class="btn" id="download-uploaded"><i data-lucide="download"></i>Download uploaded CV</button>');
        }
        if (builtDocument.isAvailable) {
          cvActions.push('<button class="btn" id="open-built"><i data-lucide="file-text"></i>Open built CV</button>');
          cvActions.push('<button class="btn" id="download-built"><i data-lucide="download"></i>Download built CV</button>');
        }
        body.innerHTML = `
          ${cvActions.length
            ? `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">${cvActions.join('')}</div>`
            : `<div class="profile-block" style="margin-bottom:14px;"><div class="profile-block-value" style="color:var(--c-text-faint);">No CV document file is available yet.</div></div>`}
          <div class="profile-grid">
            <div class="profile-block"><div class="profile-block-label">Full name</div><div class="profile-block-value">${esc(cv.fullName || '—')}</div></div>
            <div class="profile-block"><div class="profile-block-label">Email</div><div class="profile-block-value">${esc(cv.email || '—')}</div></div>
            <div class="profile-block"><div class="profile-block-label">Phone</div><div class="profile-block-value">${esc(cv.phone || '—')}</div></div>
            <div class="profile-block"><div class="profile-block-label">Address</div><div class="profile-block-value">${esc(cv.address || '—')}</div></div>
            ${cv.summary ? `<div class="profile-block" style="grid-column:1/-1;"><div class="profile-block-label">Summary</div><div class="profile-block-value">${esc(cv.summary)}</div></div>` : ''}
            ${Array.isArray(cv.skills) && cv.skills.length ? `<div class="profile-block" style="grid-column:1/-1;"><div class="profile-block-label">Skills</div><div class="tag-list">${cv.skills.map((s)=>`<span class="badge">${esc(s)}</span>`).join('')}</div></div>` : ''}
            ${Array.isArray(cv.languages) && cv.languages.length ? `<div class="profile-block" style="grid-column:1/-1;"><div class="profile-block-label">Languages</div><div class="tag-list">${cv.languages.map((s)=>`<span class="badge">${esc(s)}</span>`).join('')}</div></div>` : ''}
          </div>
        `;
        body.querySelector('#open-uploaded')?.addEventListener('click', () => fetchAndOpenCv(applicationId, 'primary'));
        body.querySelector('#download-uploaded')?.addEventListener('click', () => fetchAndOpenCv(applicationId, 'primary', true));
        body.querySelector('#open-built')?.addEventListener('click', () => fetchAndOpenCv(applicationId, 'built'));
        body.querySelector('#download-built')?.addEventListener('click', () => fetchAndOpenCv(applicationId, 'built', true));
        if (window.lucide) window.lucide.createIcons();
      } catch (e) {
        body.innerHTML = feedbackCardHtml(friendlyDocumentErrorMessage(e), { type: 'error' });
        if (window.lucide) window.lucide.createIcons();
      }
    }
    async function fetchAndOpenCv(applicationId, variant, download = false) {
      try {
        const docResp = await getApplicationCvDocument(applicationId, { variant });
        openResolvedDocument(docResp, { download });
      } catch (e) { showToast(friendlyDocumentErrorMessage(e), 'error'); }
    }

    // ---------- small helpers ----------
    function v(id) { return (document.getElementById(id)?.value || '').trim(); }
    function numOrNull(id) { const x = document.getElementById(id)?.value; return x === '' || x == null ? null : Number(x); }
  </script>
</body>
