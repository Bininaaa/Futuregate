<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content · FutureGate Admin</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css?v=2026042012">
  <script src="js/theme-init.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="moderation">
  <div id="auth-gate" class="auth-gate"><div class="spinner"></div><p>Verifying session...</p></div>
  <div id="shell"></div>

  <!-- Editor modal -->
  <div class="modal-backdrop" id="editor-modal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3 id="editor-title">Edit</h3>
        <button class="modal-close" data-close-modal="editor-modal" aria-label="Close"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body" id="editor-body"></div>
      <div class="modal-footer">
        <button class="btn" data-close-modal="editor-modal">Cancel</button>
        <button class="btn btn-primary" id="editor-save"><i data-lucide="save"></i>Save</button>
      </div>
    </div>
  </div>

  <!-- CV viewer -->
  <div class="modal-backdrop" id="cv-modal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3>Application CV</h3>
        <button class="modal-close" data-close-modal="cv-modal" aria-label="Close"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body" id="cv-body"></div>
    </div>
  </div>

  <script type="module">
    import { mountShell, showPage } from './js/shell.js';
    import { checkAuth, emptyStateHtml, esc, feedbackCardHtml, showToast, formatTimestamp } from './js/auth.js';
    import {
      auth, db, collection, doc, getDoc, getDocs, query, orderBy, limit, where,
      setDoc, updateDoc, deleteDoc, serverTimestamp,
    } from './js/firebase-config.js';
    import { matchesSearch, getQueryParam, updateUrlParams } from './js/admin-utils.js';
    import { searchBooksViaWorker } from './js/google-books-service.js';
    import { searchYoutubeVideos } from './js/youtube-service.js';
    import { getApplicationCv, getApplicationCvDocument, openDocumentUrl, friendlyDocumentErrorMessage } from './js/document-access.js';
    import { openModal, closeModal } from './js/ui.js';

    const TABS = [
      { id: 'ideas',        label: 'Project ideas', icon: 'lightbulb' },
      { id: 'opportunities',label: 'Opportunities', icon: 'briefcase' },
      { id: 'scholarships', label: 'Scholarships',  icon: 'graduation-cap' },
      { id: 'trainings',    label: 'Library',       icon: 'book-open' },
      { id: 'applications', label: 'Applications',  icon: 'file-text' },
    ];

    // Per-tab chip filter definitions (mirrors Flutter content center)
    const FILTERS = {
      ideas: [
        { v: 'all',      l: 'All',      i: 'list' },
        { v: 'pending',  l: 'Pending',  i: 'clock' },
        { v: 'approved', l: 'Approved', i: 'check' },
        { v: 'rejected', l: 'Rejected', i: 'x-circle' },
        { v: 'hidden',   l: 'Hidden',   i: 'eye-off' },
      ],
      opportunities: [
        { v: 'all',         l: 'All opportunities', i: 'list' },
        { v: 'open',        l: 'Open',              i: 'check-circle' },
        { v: 'closed',      l: 'Closed',            i: 'lock' },
        { v: 'admin',       l: 'Posted by admin',   i: 'shield' },
        { v: 'pendingApps', l: 'Has pending apps',  i: 'hourglass' },
        { v: 'hidden',      l: 'Hidden',            i: 'eye-off' },
      ],
      opportunityTypes: [
        { v: 'all',         l: 'Any type',    i: 'layers' },
        { v: 'job',         l: 'Jobs',        i: 'briefcase' },
        { v: 'internship',  l: 'Internships', i: 'backpack' },
        { v: 'sponsoring',  l: 'Sponsoring',  i: 'gift' },
      ],
      scholarships: [
        { v: 'all',      l: 'All',      i: 'list' },
        { v: 'featured', l: 'Featured', i: 'star' },
        { v: 'hidden',   l: 'Hidden',   i: 'eye-off' },
      ],
      trainings: [
        { v: 'all',      l: 'All',      i: 'list' },
        { v: 'featured', l: 'Featured', i: 'star' },
        { v: 'hidden',   l: 'Hidden',   i: 'eye-off' },
        { v: 'books',    l: 'Books',    i: 'book' },
        { v: 'videos',   l: 'Videos',   i: 'video' },
      ],
      applications: [
        { v: 'all',      l: 'All',      i: 'list' },
        { v: 'pending',  l: 'Pending',  i: 'clock' },
        { v: 'reviewed', l: 'Reviewed', i: 'eye' },
        { v: 'accepted', l: 'Accepted', i: 'check' },
        { v: 'rejected', l: 'Rejected', i: 'x-circle' },
      ],
    };

    mountShell({ page: 'content' });

    const state = {
      activeTab: getQueryParam('tab') || 'ideas',
      ideas: [], applications: [], opportunities: [], scholarships: [], trainings: [],
      booksResults: [], youtubeResults: [],
      librarySource: 'overview', // overview | books | youtube
      filter: 'all',
      oppType: 'all',
      search: '',
    };
    if (!TABS.find((t) => t.id === state.activeTab)) state.activeTab = 'ideas';

    checkAuth(async () => { await initPage(); });

    // ---------- Shell ----------
    async function initPage() {
      const root = document.getElementById('page-content');
      root.innerHTML = `
        <div id="stats-pills" class="summary-pills"></div>
        <div class="tabs" id="tab-bar">
          ${TABS.map((t) => `<button class="tab${t.id === state.activeTab ? ' active' : ''}" data-tab="${t.id}"><i data-lucide="${t.icon}"></i><span>${esc(t.label)}</span></button>`).join('')}
        </div>
        <section class="surface-panel" id="tab-panel"></section>
      `;
      document.querySelectorAll('#tab-bar .tab').forEach((btn) => {
        btn.addEventListener('click', () => {
          state.activeTab = btn.getAttribute('data-tab');
          document.querySelectorAll('#tab-bar .tab').forEach((b) => b.classList.toggle('active', b === btn));
          updateUrlParams({ tab: state.activeTab });
          state.filter = 'all';
          state.oppType = 'all';
          state.search = '';
          renderTab();
        });
      });
      await loadAll();
      renderStats();
      renderTab();
      showPage();
      handleDeepLink();
    }

    function handleDeepLink() {
      const targets = {
        ideas:         { p: 'ideaId',         list: state.ideas,         open: (it) => { window.location.href = 'idea-editor.html?id=' + encodeURIComponent(it.id); } },
        applications:  { p: 'applicationId',  list: state.applications,  open: (it) => openCvViewer(it.id) },
        opportunities: { p: 'opportunityId',  list: state.opportunities, open: (it) => openOppEditor(it) },
        scholarships:  { p: 'scholarshipId',  list: state.scholarships,  open: (it) => openScholarEditor(it) },
        trainings:     { p: 'trainingId',     list: state.trainings,     open: null },
      };
      const t = targets[state.activeTab];
      if (!t) return;
      const id = getQueryParam(t.p);
      if (!id) return;
      const item = t.list.find((x) => x.id === id);
      if (!item) return;
      requestAnimationFrame(() => {
        const row = document.querySelector(`#list [data-row-id="${CSS.escape(id)}"]`);
        if (row) {
          row.style.outline = '2px solid var(--c-primary)';
          row.scrollIntoView({ behavior: 'smooth', block: 'center' });
          setTimeout(() => { row.style.outline = ''; }, 2400);
        }
      });
      if (t.open) t.open(item);
    }

    async function loadAll() {
      try {
        const [ideasS, appsS, oppsS, scholarS, trainS] = await Promise.all([
          getDocs(query(collection(db, 'projectIdeas'), orderBy('createdAt', 'desc'))),
          getDocs(query(collection(db, 'applications'), orderBy('appliedAt', 'desc'))),
          getDocs(query(collection(db, 'opportunities'), orderBy('createdAt', 'desc'))),
          getDocs(query(collection(db, 'scholarships'), orderBy('createdAt', 'desc'))),
          getDocs(collection(db, 'trainings')),
        ]);
        state.ideas         = ideasS.docs.map((s) => ({ id: s.id, ...s.data() }));
        state.applications  = appsS.docs.map((s) => ({ id: s.id, ...s.data() }));
        state.opportunities = oppsS.docs.map((s) => ({ id: s.id, ...s.data() }));
        state.scholarships  = scholarS.docs.map((s) => ({ id: s.id, ...s.data() }));
        state.trainings     = trainS.docs.map((s) => ({ id: s.id, ...s.data() }));
      } catch (e) {
        console.error(e);
        const panel = document.getElementById('tab-panel');
        if (panel) panel.innerHTML = feedbackCardHtml('Could not load content.', { type: 'error' });
      }
    }

    // ---------- Stats ----------
    function renderStats() {
      const el = document.getElementById('stats-pills');
      if (!el) return;
      const pendingIdeas = state.ideas.filter((x) => (x.status || 'pending') === 'pending').length;
      const pendingApps = state.applications.filter((x) => (x.status || 'pending') === 'pending').length;
      const opps = state.opportunities.length;
      const scholarships = state.scholarships.length;
      const resources = state.trainings.length;
      el.innerHTML = `
        <span class="summary-pill is-primary"><i data-lucide="lightbulb"></i><strong>${state.ideas.length}</strong> ideas</span>
        ${pendingIdeas ? `<span class="summary-pill is-warning"><i data-lucide="clock"></i><strong>${pendingIdeas}</strong> pending ideas</span>` : ''}
        ${pendingApps ? `<span class="summary-pill is-danger"><i data-lucide="hourglass"></i><strong>${pendingApps}</strong> pending apps</span>` : ''}
        <span class="summary-pill is-info"><i data-lucide="briefcase"></i><strong>${opps}</strong> opportunities</span>
        <span class="summary-pill"><i data-lucide="graduation-cap"></i><strong>${scholarships}</strong> scholarships</span>
        <span class="summary-pill is-success"><i data-lucide="book-open"></i><strong>${resources}</strong> resources</span>
      `;
      if (window.lucide) window.lucide.createIcons();
    }

    // ---------- Tabs ----------
    function renderTab() {
      const panel = document.getElementById('tab-panel');
      switch (state.activeTab) {
        case 'ideas':         return renderIdeasTab(panel);
        case 'applications':  return renderApplicationsTab(panel);
        case 'opportunities': return renderOppsTab(panel);
        case 'scholarships':  return renderScholarsTab(panel);
        case 'trainings':     return renderTrainingsTab(panel);
      }
    }

    // ---------- Shared bits ----------
    function chipFilterBar(tab) {
      const chips = FILTERS[tab] || [];
      return `
        <div class="chip-row">
          <div class="chip-group">
            ${chips.map((c) => `<button class="chip${state.filter===c.v?' active':''}" data-filter-value="${c.v}">${c.i?`<i data-lucide="${c.i}"></i>`:''}${esc(c.l)}</button>`).join('')}
          </div>
        </div>`;
    }
    function searchBar(placeholder) {
      return `<div class="filter-bar">
        <div class="search-bar" style="flex:1;"><i data-lucide="search"></i><input id="search" type="search" placeholder="${esc(placeholder)}" value="${esc(state.search)}"/></div>
      </div>`;
    }
    function bindCommon() {
      document.querySelectorAll('[data-filter-value]').forEach((b) => {
        b.addEventListener('click', () => { state.filter = b.getAttribute('data-filter-value'); renderTab(); });
      });
      const s = document.getElementById('search');
      if (s) s.addEventListener('input', (e) => { state.search = e.target.value; renderTab(); });
    }
    function matchesQuery(x, fields) {
      const q = state.search.trim();
      if (!q) return true;
      return matchesSearch(fields, q);
    }
    function bindRowActions(handler) {
      document.getElementById('list')?.querySelectorAll('[data-action]').forEach((btn) => {
        btn.addEventListener('click', () => handler(btn.getAttribute('data-id'), btn.getAttribute('data-action')));
      });
    }
    function truncate(s, n) { return s && s.length > n ? s.slice(0, n - 1) + '…' : s; }
    function toDateInput(value) {
      const d = value?.toDate ? value.toDate() : (value?.seconds ? new Date(value.seconds * 1000) : (value instanceof Date ? value : null));
      if (!d) return '';
      return d.toISOString().slice(0, 10);
    }
    function splitLines(s) { return String(s || '').split(/\r?\n/).map((x) => x.trim()).filter(Boolean); }
    function splitCsv(s) { return String(s || '').split(',').map((x) => x.trim()).filter(Boolean); }
    function joinLines(arr) { return Array.isArray(arr) ? arr.join('\n') : ''; }
    function joinCsv(arr) { return Array.isArray(arr) ? arr.join(', ') : ''; }
    function section(title, icon, innerHtml) {
      return `<div class="profile-section">
        <div class="profile-section__title"><i data-lucide="${icon}"></i>${esc(title)}</div>
        ${innerHtml}
      </div>`;
    }

    // =============== IDEAS ===============
    function renderIdeasTab(panel) {
      let items = state.ideas.slice();
      if (state.filter === 'pending')  items = items.filter((x) => (x.status || 'pending') === 'pending');
      if (state.filter === 'approved') items = items.filter((x) => x.status === 'approved');
      if (state.filter === 'rejected') items = items.filter((x) => x.status === 'rejected');
      if (state.filter === 'hidden')   items = items.filter((x) => x.isHidden === true);
      items = items.filter((x) => matchesQuery(x, [x.title, x.tagline, x.shortDescription, x.description, x.domain, x.submittedByName]));

      panel.innerHTML = `
        ${chipFilterBar('ideas')}
        ${searchBar('Search ideas...')}
        <div style="display:flex; justify-content:flex-end; margin-bottom:12px;">
          <button class="btn btn-primary" id="new-idea"><i data-lucide="plus"></i>New idea</button>
        </div>
        <div class="list-grid" id="list">${items.length ? items.map(renderIdeaRow).join('') : emptyStateHtml('Try a different filter.', { title: 'No project ideas', icon: 'lightbulb' })}</div>
      `;
      bindCommon();
      document.getElementById('new-idea').addEventListener('click', () => { window.location.href = 'idea-editor.html'; });
      bindRowActions((id, action) => handleIdeaAction(id, action));
      if (window.lucide) window.lucide.createIcons();
    }

    function renderIdeaRow(it) {
      const status = it.status || 'pending';
      const badgeClass = status === 'approved' ? 'success' : status === 'rejected' ? 'danger' : 'warning';
      return `<div class="item-row" data-row-id="${it.id}">
        <div class="activity-icon" style="background:rgba(245,158,11,0.14);color:#F59E0B"><i data-lucide="lightbulb"></i></div>
        <div class="row-body">
          <div class="row-title">${esc(it.title || 'Untitled idea')}</div>
          <div class="row-sub">${esc(truncate(it.tagline || it.shortDescription || it.description || '', 140))}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;">
            <span class="badge badge-${badgeClass}">${esc(status)}</span>
            ${it.isHidden ? '<span class="badge badge-danger"><i data-lucide="eye-off"></i>Hidden</span>' : ''}
            ${it.domain ? `<span class="badge"><i data-lucide="tag"></i>${esc(it.domain)}</span>` : ''}
            ${it.academicLevel ? `<span class="badge">${esc(it.academicLevel)}</span>` : ''}
            ${it.submittedByName ? `<span class="badge"><i data-lucide="user"></i>${esc(it.submittedByName)}</span>` : ''}
            <span class="badge"><i data-lucide="calendar"></i>${esc(formatTimestamp(it.createdAt) || '—')}</span>
          </div>
        </div>
        <div class="row-actions">
          ${status !== 'approved' ? `<button class="btn btn-sm btn-success" data-id="${it.id}" data-action="approve" title="Approve"><i data-lucide="check"></i></button>` : ''}
          ${status !== 'rejected' ? `<button class="btn btn-sm btn-danger" data-id="${it.id}" data-action="reject" title="Reject"><i data-lucide="x"></i></button>` : ''}
          <button class="btn btn-sm" data-id="${it.id}" data-action="toggle-hide" title="${it.isHidden ? 'Unhide' : 'Hide'}"><i data-lucide="${it.isHidden ? 'eye' : 'eye-off'}"></i></button>
          <button class="btn btn-sm" data-id="${it.id}" data-action="edit" title="Edit"><i data-lucide="pencil"></i></button>
          <button class="btn btn-sm btn-danger" data-id="${it.id}" data-action="delete" title="Delete"><i data-lucide="trash-2"></i></button>
        </div>
      </div>`;
    }

    async function handleIdeaAction(id, action) {
      const ref = doc(db, 'projectIdeas', id);
      const it = state.ideas.find((x) => x.id === id);
      try {
        if (action === 'approve') { await updateDoc(ref, { status: 'approved' }); it.status = 'approved'; showToast('Idea approved.', 'success'); }
        else if (action === 'reject') { await updateDoc(ref, { status: 'rejected' }); it.status = 'rejected'; showToast('Idea rejected.', 'success'); }
        else if (action === 'toggle-hide') { const next = !it.isHidden; await updateDoc(ref, { isHidden: next }); it.isHidden = next; showToast(next ? 'Idea hidden.' : 'Idea visible again.', 'success'); }
        else if (action === 'edit') { window.location.href = 'idea-editor.html?id=' + encodeURIComponent(id); return; }
        else if (action === 'delete') {
          if (!confirm('Delete this idea?')) return;
          await deleteDoc(ref);
          state.ideas = state.ideas.filter((x) => x.id !== id);
          showToast('Idea deleted.', 'success');
        }
        renderStats(); renderTab();
      } catch (e) { console.error(e); showToast('Action failed.', 'error'); }
    }

    function openIdeaEditor(it) {
      document.getElementById('editor-title').textContent = it ? 'Edit idea' : 'New idea';
      document.getElementById('editor-body').innerHTML = `
        ${section('Core story', 'book-open', `
          <div class="form-row"><label>Title *</label><input id="f-title" type="text" value="${esc(it?.title || '')}"/></div>
          <div class="form-row"><label>Tagline</label><input id="f-tagline" type="text" value="${esc(it?.tagline || '')}"/></div>
          <div class="form-row"><label>Short description</label><textarea id="f-short" rows="2">${esc(it?.shortDescription || '')}</textarea></div>
          <div class="form-row"><label>Full description</label><textarea id="f-description" rows="6">${esc(it?.description || '')}</textarea></div>
        `)}
        ${section('Metadata', 'tag', `
          <div class="form-grid-2">
            <div class="form-row"><label>Domain</label><input id="f-domain" type="text" value="${esc(it?.domain || '')}"/></div>
            <div class="form-row"><label>Academic level</label>
              <select id="f-level">
                <option value="">—</option>
                ${['Bac','Licence','Master','Doctorat'].map((lv) => `<option value="${lv}" ${it?.academicLevel===lv?'selected':''}>${lv}</option>`).join('')}
              </select>
            </div>
            <div class="form-row"><label>Category</label><input id="f-category" type="text" value="${esc(it?.category || '')}"/></div>
            <div class="form-row"><label>Stage</label>
              <select id="f-stage">
                <option value="">—</option>
                ${['Concept','Prototype','MVP','Launched'].map((lv) => `<option value="${lv}" ${it?.stage===lv?'selected':''}>${lv}</option>`).join('')}
              </select>
            </div>
            <div class="form-row"><label>Language</label>
              <select id="f-lang">
                ${[['fr','French'],['en','English'],['ar','Arabic']].map(([v,l]) => `<option value="${v}" ${((it?.originalLanguage||'fr')===v)?'selected':''}>${l}</option>`).join('')}
              </select>
            </div>
            <div class="form-row"><label>Status</label>
              <select id="f-status">
                ${['pending','approved','rejected'].map((s) => `<option value="${s}" ${(it?.status||'pending')===s?'selected':''}>${s}</option>`).join('')}
              </select>
            </div>
          </div>
        `)}
        ${section('Collaboration', 'users', `
          <div class="form-row"><label>Tools / stack (comma separated)</label><input id="f-tools" type="text" value="${esc(joinCsv(it?.tools))}"/></div>
          <div class="form-row"><label>Tags (comma separated)</label><input id="f-tags" type="text" value="${esc(joinCsv(it?.tags))}"/></div>
          <div class="form-row"><label>Skills needed (comma separated)</label><input id="f-skills" type="text" value="${esc(joinCsv(it?.skillsNeeded))}"/></div>
          <div class="form-row"><label>Team roles needed (comma separated)</label><input id="f-roles" type="text" value="${esc(joinCsv(it?.teamRoles))}"/></div>
          <div class="form-row"><label>Target audience</label><input id="f-audience" type="text" value="${esc(it?.targetAudience || '')}"/></div>
          <div class="form-row"><label>Problem statement</label><textarea id="f-problem" rows="3">${esc(it?.problemStatement || '')}</textarea></div>
          <div class="form-row"><label>Solution</label><textarea id="f-solution" rows="3">${esc(it?.solution || '')}</textarea></div>
          <div class="form-row"><label>Resources needed</label><textarea id="f-resources" rows="2">${esc(it?.resourcesNeeded || '')}</textarea></div>
          <div class="form-row"><label>Benefits / impact</label><textarea id="f-benefits" rows="2">${esc(it?.benefits || '')}</textarea></div>
          <div style="display:flex;gap:18px;flex-wrap:wrap;margin-top:10px;">
            <label style="display:flex;align-items:center;gap:8px;"><input id="f-hidden" type="checkbox" ${it?.isHidden?'checked':''}/> Hidden</label>
            <label style="display:flex;align-items:center;gap:8px;"><input id="f-open" type="checkbox" ${it?.openForCollab?'checked':''}/> Open to collaboration</label>
          </div>
        `)}
      `;
      openModal('editor-modal');
      document.getElementById('editor-save').onclick = async () => {
        const payload = {
          title: v('f-title'), tagline: v('f-tagline'),
          shortDescription: v('f-short'), description: v('f-description'),
          domain: v('f-domain'), academicLevel: v('f-level'),
          category: v('f-category'), stage: v('f-stage'),
          originalLanguage: v('f-lang'), status: v('f-status'),
          tools: splitCsv(v('f-tools')), tags: splitCsv(v('f-tags')),
          skillsNeeded: splitCsv(v('f-skills')), teamRoles: splitCsv(v('f-roles')),
          targetAudience: v('f-audience'), problemStatement: v('f-problem'),
          solution: v('f-solution'), resourcesNeeded: v('f-resources'),
          benefits: v('f-benefits'),
          isHidden: document.getElementById('f-hidden').checked,
          openForCollab: document.getElementById('f-open').checked,
        };
        if (!payload.title) { showToast('Title is required.', 'warning'); return; }
        try {
          if (it) {
            await updateDoc(doc(db, 'projectIdeas', it.id), payload);
            Object.assign(it, payload);
            showToast('Idea updated.', 'success');
          } else {
            const ref = doc(collection(db, 'projectIdeas'));
            const created = { ...payload, createdAt: serverTimestamp(), submittedBy: auth.currentUser?.uid || '', submittedByName: 'Admin' };
            await setDoc(ref, created);
            state.ideas.unshift({ id: ref.id, ...created, createdAt: { toDate: () => new Date() } });
            showToast('Idea created.', 'success');
          }
          closeModal('editor-modal'); renderStats(); renderTab();
        } catch (e) { console.error(e); showToast('Save failed.', 'error'); }
      };
      if (window.lucide) window.lucide.createIcons();
    }

    // =============== OPPORTUNITIES ===============
    function isLatest(it) {
      const d = it.createdAt?.toDate ? it.createdAt.toDate() : (it.createdAt?.seconds ? new Date(it.createdAt.seconds * 1000) : null);
      if (!d) return false;
      return (Date.now() - d.getTime()) < 30 * 24 * 3600 * 1000;
    }
    function oppPendingAppsCount(oppId) {

    // =============== TRAININGS / LIBRARY ===============
    function trainingSort(a, b) {
      // Hidden last, approved middle, featured top, then date desc
      const hiddenDelta = (a.isHidden ? 1 : 0) - (b.isHidden ? 1 : 0);
      if (hiddenDelta) return hiddenDelta;
      const featuredDelta = (b.isFeatured ? 1 : 0) - (a.isFeatured ? 1 : 0);
      if (featuredDelta) return featuredDelta;
      const approvedDelta = ((b.isApproved !== false) ? 1 : 0) - ((a.isApproved !== false) ? 1 : 0);
      if (approvedDelta) return approvedDelta;
      const da = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : 0;
      const db_ = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : 0;
      return db_ - da;
    }

    async function handleTrainingAction(id, action) {
      const ref = doc(db, 'trainings', id);
      const it = state.trainings.find((x) => x.id === id);
      try {
        if (action === 'toggle-feature') { const next = !it.isFeatured; await updateDoc(ref, { isFeatured: next }); it.isFeatured = next; showToast(next ? 'Featured.' : 'Unfeatured.', 'success'); }
        else if (action === 'toggle-hide') { const next = !it.isHidden; await updateDoc(ref, { isHidden: next }); it.isHidden = next; showToast(next ? 'Hidden.' : 'Visible.', 'success'); }
        else if (action === 'delete') {
          if (!confirm('Delete this resource?')) return;
          await deleteDoc(ref);
          state.trainings = state.trainings.filter((x) => x.id !== id);
          showToast('Resource deleted.', 'success');
        }
        renderStats(); renderTab();
      } catch (e) { console.error(e); showToast('Action failed.', 'error'); }
    }

    async function getToken() { return auth.currentUser ? auth.currentUser.getIdToken() : ''; }

    async function runBooks() {
      const q = document.getElementById('lib-q').value.trim();
      const results = document.getElementById('lib-results');
      if (!q) { results.innerHTML = ''; return; }
      results.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      try {
        const token = await getToken();
        const items = await searchBooksViaWorker({ query: q, maxResults: 12, authToken: token });
        if (!items.length) { results.innerHTML = emptyStateHtml('Try different keywords.', { title: 'No books found', icon: 'book' }); if (window.lucide) window.lucide.createIcons(); return; }
        state.booksResults = items;
        results.innerHTML = items.map((b, i) => `
          <div class="import-card">

        if (window.lucide) window.lucide.createIcons();

    async function importBook(book) {
      try {
        const meta = importMeta();
        const ref = doc(collection(db, 'trainings'));
        const payload = {
          title: book.title || 'Untitled', description: book.description || '',
          provider: (book.authors || []).join(', '),
          source: 'google_books', type: 'book',
          url: book.previewLink || book.infoLink || '',
          thumbnailUrl: book.thumbnail || '',
          domain: meta.domain, level: meta.level, language: meta.language === 'any' ? '' : meta.language,
          isFeatured: false, isHidden: false, isApproved: true,
          createdAt: serverTimestamp(),
          createdBy: auth.currentUser?.uid || '',
        };
        await setDoc(ref, payload);
        state.trainings.push({ id: ref.id, ...payload, createdAt: { toDate: () => new Date() } });
        renderStats();
        showToast('Book imported to library.', 'success');
      } catch (e) { console.error(e); showToast('Import failed.', 'error'); }

    async function handleAppAction(id, action) {
      const ref = doc(db, 'applications', id);
      const it = state.applications.find((x) => x.id === id);
      try {
        if (action === 'cv') return openCvViewer(id);
        const map = { accept: 'accepted', reject: 'rejected', reviewed: 'reviewed' };
        const next = map[action]; if (!next) return;
        await updateDoc(ref, { status: next }); it.status = next;
        showToast(`Application ${next}.`, 'success');
        renderStats(); renderTab();
      } catch (e) { console.error(e); showToast('Action failed.', 'error'); }
    }

      body.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

        const cv = await getApplicationCv(applicationId);

        body.innerHTML = `

            <div class="profile-block"><div class="profile-block-label">Phone</div><div class="profile-block-value">${esc(cv.phone || '—')}</div></div>

            ${Array.isArray(cv.skills) && cv.skills.length ? `<div class="profile-block" style="grid-column:1/-1;"><div class="profile-block-label">Skills</div><div class="tag-list">${cv.skills.map((s)=>`<span class="badge">${esc(s)}</span>`).join('')}</div></div>` : ''}

        if (window.lucide) window.lucide.createIcons();
      }
    }
    async function fetchAndOpenCv(applicationId, variant) {
      try {
        const docResp = await getApplicationCvDocument(applicationId, { variant });
        if (!docResp?.url) throw new Error('Document unavailable');
        openDocumentUrl(docResp.url, { fileName: docResp.fileName });
      } catch (e) { showToast(friendlyDocumentErrorMessage(e), 'error'); }
    }

    // ---------- small helpers ----------
    function v(id) { return (document.getElementById(id)?.value || '').trim(); }
    function numOrNull(id) { const x = document.getElementById(id)?.value; return x === '' || x == null ? null : Number(x); }
  </script>
</body>
