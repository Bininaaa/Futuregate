<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · FutureGate Admin</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css?v=2026042007">
  <script src="js/theme-init.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body data-page="dashboard">
  <div id="auth-gate" class="auth-gate"><div class="spinner"></div><p>Verifying session...</p></div>
  <div id="shell"></div>

  <script type="module">
    import { mountShell, showPage } from './js/shell.js';
    import { checkAuth, emptyStateHtml, esc, feedbackCardHtml, formatTimestamp } from './js/auth.js';
    import { db, collection, getDocs, query, orderBy, limit, where } from './js/firebase-config.js';
    import { createActivityState, loadRecentActivitiesPage } from './js/activity-service.js';
    import { activityTypeLabel, adminTargetUrl, typeColor, typeIcon } from './js/admin-utils.js';
    import { openDetailsModal } from './js/details.js';
    import './js/ui.js';

    mountShell({ page: 'dashboard' });

    const dashState = createActivityState();

    checkAuth(async () => { await loadDashboard(); });

    async function loadDashboard() {
      try {
        const [usersSnap, oppsSnap, appsSnap, scholarSnap, trainSnap, ideasSnap, cvsSnap, savedSnap, convosSnap] = await Promise.all([
          getDocs(collection(db, 'users')),
          getDocs(collection(db, 'opportunities')),
          getDocs(collection(db, 'applications')),
          getDocs(collection(db, 'scholarships')),
          getDocs(collection(db, 'trainings')),
          getDocs(collection(db, 'projectIdeas')),
          getDocs(collection(db, 'cvs')),
          getDocs(collection(db, 'savedOpportunities')),
          getDocs(query(collection(db, 'conversations'), where('status', '==', 'active'))),
        ]);

        let total = 0, students = 0, companies = 0, admins = 0, active = 0, inactive = 0;
        let bac = 0, licence = 0, master = 0, doctorat = 0;
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const monthlyMap = Object.fromEntries(months.map((m) => [m, 0]));

        usersSnap.forEach((s) => {
          const d = s.data(); total += 1;
          if (d.role === 'student') {
            students += 1;
            if (d.academicLevel === 'bac') bac += 1;
            else if (d.academicLevel === 'licence') licence += 1;
            else if (d.academicLevel === 'master') master += 1;
            else if (d.academicLevel === 'doctorat') doctorat += 1;
          } else if (d.role === 'company') companies += 1;
          else if (d.role === 'admin') admins += 1;
          if (d.isActive !== false) active += 1; else inactive += 1;
          if (d.createdAt) {
            const date = d.createdAt.toDate ? d.createdAt.toDate() : new Date(d.createdAt.seconds * 1000);
            monthlyMap[months[date.getMonth()]] = (monthlyMap[months[date.getMonth()]] || 0) + 1;
          }
        });

        const totalApps = appsSnap.size, totalOpps = oppsSnap.size;
        const appRate = totalOpps > 0 ? totalApps / totalOpps : 0;
        const totalCvs = cvsSnap.size;
        const cvRate = students > 0 ? (totalCvs / students) * 100 : 0;

        let pendingIdeas = 0, approvedIdeas = 0;
        ideasSnap.forEach((s) => {
          const st = s.data().status || 'pending';
          if (st === 'pending') pendingIdeas += 1; else if (st === 'approved') approvedIdeas += 1;
        });

        const oppMeta = {};
        oppsSnap.forEach((s) => {
          const d = s.data();
          oppMeta[s.id] = {
            id: s.id,
            title: d.title || 'Untitled',
            type: d.type || d.opportunityType || 'opportunity',
            status: (d.status || 'active').toLowerCase(),
            companyName: d.companyName || '',
            companyLogo: d.companyLogo || d.logo || '',
            isFeatured: !!d.isFeatured,
          };
        });
        const appCounts = {}; appsSnap.forEach((s) => { const id = s.data().opportunityId || ''; appCounts[id] = (appCounts[id] || 0) + 1; });
        const saveCounts = {}; savedSnap.forEach((s) => { const id = s.data().opportunityId || ''; saveCounts[id] = (saveCounts[id] || 0) + 1; });
        const buildTop = (counts) => Object.entries(counts)
          .filter(([id]) => id && oppMeta[id] && oppMeta[id].status !== 'closed')
          .sort((a,b) => b[1] - a[1])
          .slice(0, 3)
          .map(([id, count]) => ({ ...oppMeta[id], count }));
        const topApplied = buildTop(appCounts);
        const topSaved = buildTop(saveCounts);

        /* Control room: what needs admin attention right now */
        let pendingCompanies = 0, blockedUsers = 0;
        usersSnap.forEach((s) => {
          const d = s.data();
          if (d.role === 'company' && (d.approvalStatus === 'pending' || d.isApproved === false)) pendingCompanies += 1;
          if (d.isActive === false) blockedUsers += 1;
        });
        let pendingApps = 0;
        appsSnap.forEach((s) => { if ((s.data().status || 'pending') === 'pending') pendingApps += 1; });
        let hiddenOpps = 0;
        oppsSnap.forEach((s) => { if (s.data().isHidden) hiddenOpps += 1; });

        const root = document.getElementById('page-content');
        root.innerHTML = `
          <section class="surface-panel">
            <div class="surface-heading">
              <div>
                <div class="surface-heading-title">Control room</div>
                <div class="surface-heading-copy">What needs your attention right now.</div>
              </div>
            </div>
            <div class="control-room">
              ${controlCard({ count: pendingIdeas, label: 'Project ideas awaiting review', icon: 'lightbulb', color: '#F59E0B', href: 'moderation.html?tab=ideas', cta: 'Review ideas' })}
              ${controlCard({ count: pendingApps, label: 'Pending applications', icon: 'file-text', color: '#7C3AED', href: 'moderation.html?tab=opportunities&filter=pending_apps', cta: 'Review in opportunities' })}
              ${controlCard({ count: pendingCompanies, label: 'Companies awaiting approval', icon: 'building-2', color: '#14B8A6', href: 'users.html?role=company&status=pending', cta: 'Review companies' })}
              ${controlCard({ count: blockedUsers, label: 'Blocked users', icon: 'shield-alert', color: '#E24A4A', href: 'users.html?status=blocked', cta: 'Manage blocked' })}
              ${controlCard({ count: hiddenOpps, label: 'Hidden opportunities', icon: 'eye-off', color: '#64748B', href: 'moderation.html?tab=opportunities', cta: 'Review hidden' })}
            </div>
          </section>

          <section class="surface-panel">
            <div class="surface-heading"><div><div class="surface-heading-title">Overview</div></div></div>
            <div class="stats-grid">
              ${stat('Total users', total, 'users', 'var(--c-primary)')}
              ${stat('Active', active, 'check-circle-2', 'var(--c-success)')}
              ${stat('Inactive', inactive, 'x-circle', 'var(--c-danger)')}
              ${stat('Students', students, 'graduation-cap', 'var(--c-info)')}
              ${stat('Companies', companies, 'building-2', 'var(--c-secondary)')}
            </div>
          </section>

          <section class="surface-panel">
            <div class="surface-heading"><div><div class="surface-heading-title">Academic levels</div></div></div>
            <div class="stats-grid">
              ${stat('Bac', bac, 'book', 'var(--c-warning)')}
              ${stat('Licence', licence, 'book-marked', 'var(--c-info)')}
              ${stat('Master', master, 'award', 'var(--c-activity)')}
              ${stat('Doctorat', doctorat, 'medal', 'var(--c-secondary)')}
            </div>
          </section>

          <section class="charts-grid">
            <div class="chart-card"><h3>Users by level</h3><canvas id="levelChart"></canvas></div>
            <div class="chart-card"><h3>Roles</h3><canvas id="roleChart"></canvas></div>
          </section>

          <section class="chart-card"><h3>Monthly registrations</h3><canvas id="monthlyChart"></canvas></section>

          <section class="surface-panel">
            <div class="surface-heading"><div><div class="surface-heading-title">Content</div></div></div>
            <div class="stats-grid">
              ${stat('Opportunities', totalOpps, 'briefcase', 'var(--c-accent)')}
              ${stat('Applications', totalApps, 'file-text', 'var(--c-activity)')}
              ${stat('Scholarships', scholarSnap.size, 'graduation-cap', 'var(--c-danger)')}
              ${stat('Trainings', trainSnap.size, 'book-open', 'var(--c-secondary)')}
              ${stat('Project ideas', ideasSnap.size, 'lightbulb', 'var(--c-warning)')}
              ${stat('Conversations', convosSnap.size, 'message-square', 'var(--c-success)')}
            </div>
          </section>

          <section class="surface-panel">
            <div class="surface-heading"><div><div class="surface-heading-title">Quick actions</div></div></div>
            <div class="quick-access-grid">
              ${quick('briefcase','Opportunities','moderation.html?tab=opportunities','var(--c-accent)','Review jobs, internships, and sponsoring posts.')}
              ${quick('file-text','Pending apps','moderation.html?tab=opportunities&filter=pending_apps','var(--c-activity)','Review applications inside admin-posted opportunities.')}
              ${quick('graduation-cap','Scholarships','moderation.html?tab=scholarships','var(--c-danger)','Publish and curate scholarships.')}
              ${quick('book-open','Trainings','moderation.html?tab=trainings','var(--c-secondary)','Curate the training catalog.')}
              ${quick('library','Library','moderation.html?tab=trainings','var(--c-info)','Import books and videos.')}
              ${quick('lightbulb','Project ideas','moderation.html?tab=ideas','var(--c-warning)','Approve student submissions.')}
              ${quick('users','Users','users.html','var(--c-primary)','Approve companies, manage accounts.')}
              ${quick('activity','Activity','activity.html','var(--c-success)','See the latest events.')}
            </div>
          </section>

          <section class="surface-panel">
            <div class="surface-heading"><div><div class="surface-heading-title">Engagement</div></div></div>
            <div>
              ${engagement('Application rate', appRate.toFixed(1) + ' apps / opportunity', 'trending-up', 'var(--c-info)')}
              ${engagement('CV completion', `${cvRate.toFixed(0)}% (${totalCvs} of ${students} students)`, 'file-check-2', 'var(--c-success)')}
              ${engagement('Project ideas pipeline', `${pendingIdeas} pending · ${approvedIdeas} approved`, 'lightbulb', 'var(--c-warning)')}
            </div>
          </section>

          <section class="charts-grid">
            <div class="surface-panel" id="top-applied"></div>
            <div class="surface-panel" id="top-saved"></div>
          </section>

          <section class="surface-panel">
            <div class="section-card-header">
              <h3>Recent activity</h3>
              <a class="section-link" href="activity.html">View all <i data-lucide="arrow-right" class="sm"></i></a>
            </div>
            <div id="activity-feed" class="list-grid"></div>
          </section>

          <section class="surface-panel">
            <div class="section-card-header"><h3>Recent users</h3><a class="section-link" href="users.html">All users <i data-lucide="arrow-right" class="sm"></i></a></div>
            <div id="recent-users" class="list-grid"></div>
          </section>

          <section class="surface-panel">
            <div class="section-card-header"><h3>Recent opportunities</h3><a class="section-link" href="moderation.html?tab=opportunities">All <i data-lucide="arrow-right" class="sm"></i></a></div>
            <div id="recent-opps" class="list-grid"></div>
          </section>
        `;

        renderTopList('top-applied', 'Most applied', topApplied, 'apps', 'var(--c-activity)');
        renderTopList('top-saved', 'Most saved', topSaved, 'saves', 'var(--c-accent)');
        renderCharts({ bac, licence, master, doctorat, students, companies, admins, monthlyMap, months });
        await renderActivity();
        await renderRecentUsers();
        await renderRecentOpps();

        showPage();
        if (window.lucide) window.lucide.createIcons();
      } catch (error) {
        console.error('Dashboard load error:', error);
        document.getElementById('loading').innerHTML = feedbackCardHtml(
          'Could not load the dashboard. Please try again.',
          { type: 'error', title: 'Unable to load' },
        );
        if (window.lucide) window.lucide.createIcons();
      }
    }

    function stat(title, value, icon, color) {
      return `<div class="stat-card">
        <div class="stat-icon" style="background:${color}1a;color:${color}"><i data-lucide="${icon}"></i></div>
        <div class="stat-info"><h4>${esc(title)}</h4><div class="value">${value}</div></div>
      </div>`;
    }
    function quick(icon, title, href, color, copy) {
      return `<a class="quick-link-card" href="${href}">
        <div class="quick-link-icon" style="background:${color}1a;color:${color}"><i data-lucide="${icon}"></i></div>
        <div class="quick-link-title">${esc(title)}</div>
        <div class="quick-link-copy">${esc(copy)}</div>
      </a>`;
    }
    function engagement(title, value, icon, color) {
      return `<div class="engagement-card">
        <div class="engagement-icon" style="background:${color}1a;color:${color}"><i data-lucide="${icon}"></i></div>
        <div class="engagement-info"><h4>${esc(title)}</h4><div class="value">${esc(value)}</div></div>
      </div>`;
    }
    function controlCard({ count, label, icon, color, href }) {
      const empty = count === 0;
      return `<a class="control-card ${empty ? 'control-empty' : ''}" href="${href}" style="--control-accent:${color}">
        <div class="control-card-icon"><i data-lucide="${empty ? 'check' : icon}"></i></div>
        <div class="control-card-count">${empty ? 'All clear' : count}</div>
        <div class="control-card-label">${esc(label)}</div>
      </a>`;
    }
    function typeLabel(t) {
      const map = { job: 'Job', internship: 'Internship', contract: 'Contract', volunteer: 'Volunteer', freelance: 'Freelance' };
      return map[t] || (t ? t.charAt(0).toUpperCase() + t.slice(1) : 'Opportunity');
    }
    function renderTopList(id, title, items, label, color) {
      const el = document.getElementById(id);
      let html = `<div class="surface-heading"><div><div class="surface-heading-title">${esc(title)}</div></div></div>`;
      if (items.length === 0) {
        html += emptyStateHtml('Highlights appear here once activity grows.', { title: 'No highlights yet', icon: 'sparkles' });
      } else {
        html += '<div class="list-grid">' + items.map((item, i) => `
          <div class="top-item" data-opp-id="${esc(item.id)}">
            <div class="top-rank" style="background:${color}1a;color:${color}">#${i + 1}</div>
            <div class="top-body">
              <div class="top-title">${esc(item.title)}</div>
              <div class="top-sub">
                <span class="mini-badge"><i data-lucide="${typeIcon('opportunity', item.type)}"></i>${esc(typeLabel(item.type))}</span>
                ${item.companyName ? `<span class="mini-badge"><i data-lucide="building-2"></i>${esc(item.companyName)}</span>` : ''}
                ${item.isFeatured ? '<span class="mini-badge" style="background:rgba(245,158,11,0.15);color:#F59E0B;"><i data-lucide="star"></i>Featured</span>' : ''}
              </div>
            </div>
            <div class="top-count" style="background:${color}1a;color:${color}">${item.count} ${label}</div>
          </div>`).join('') + '</div>';
      }
      el.innerHTML = html;
      el.querySelectorAll('.top-item').forEach((row) => {
        row.addEventListener('click', () => {
          const oid = row.getAttribute('data-opp-id');
          if (oid) openDetailsModal('opportunity', oid);
        });
      });
    }
    function renderCharts({ bac, licence, master, doctorat, students, companies, admins, monthlyMap, months }) {
      const opts = (label) => ({
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: !!label, position: 'bottom', labels: { boxWidth: 10, font: { size: 11 } } } },
        scales: label ? {} : { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
      });
      new Chart(document.getElementById('levelChart'), {
        type: 'bar',
        data: { labels: ['Bac','Licence','Master','Doctorat'],
          datasets: [{ data: [bac,licence,master,doctorat], backgroundColor: ['#F59E0B','#2563EB','#7C3AED','#14B8A6'], borderRadius: 6 }] },
        options: opts(),
      });
      new Chart(document.getElementById('roleChart'), {
        type: 'doughnut',
        data: { labels: ['Students','Companies','Admins'],
          datasets: [{ data: [students, companies, admins], backgroundColor: ['#2563EB','#14B8A6','#F59E0B'], borderWidth: 0 }] },
        options: opts(true),
      });
      new Chart(document.getElementById('monthlyChart'), {
        type: 'line',
        data: { labels: months, datasets: [{ data: months.map((m)=>monthlyMap[m]||0), borderColor: '#3B22F6', backgroundColor: 'rgba(59,34,246,0.12)', tension: 0.35, fill: true, pointRadius: 3 }] },
        options: opts(),
      });
    }

    async function renderActivity() {
      const result = await loadRecentActivitiesPage(dashState, { pageSize: 5, maxItems: 5 });
      const el = document.getElementById('activity-feed');
      if (!result.items.length) {
        el.innerHTML = emptyStateHtml('Nothing happened recently.', { title: 'No activity', icon: 'activity' });
        return;
      }
      el.innerHTML = result.items.map((it) => `
        <div class="activity-row" data-type="${esc(it.type)}" data-id="${esc(it.targetId || '')}" role="button" tabindex="0">
          <div class="activity-icon" style="background:${typeColor(it.type)}1a;color:${typeColor(it.type)}"><i data-lucide="${typeIcon(it.type)}"></i></div>
          <div class="row-body">
            <div class="row-title">${esc(it.title)}</div>
            <div class="row-sub"><span class="mini-badge"><i data-lucide="${typeIcon(it.type)}"></i>${esc(activityTypeLabel(it.type))}</span> ${esc(it.description)}</div>
          </div>
          <div class="activity-time">${esc(formatTimestamp(it.timestamp))}</div>
        </div>
      `).join('');
      el.querySelectorAll('.activity-row').forEach((row) => {
        const go = () => {
          const type = row.getAttribute('data-type');
          const id = row.getAttribute('data-id');
          if (type && id) openDetailsModal(type, id);
        };
        row.addEventListener('click', go);
        row.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(); } });
      });
    }

    async function renderRecentUsers() {
      const snap = await getDocs(query(collection(db, 'users'), orderBy('createdAt', 'desc'), limit(5)));
      const el = document.getElementById('recent-users');
      if (snap.empty) {
        el.innerHTML = emptyStateHtml('No users yet.', { title: 'Empty', icon: 'users' });
        return;
      }
      el.innerHTML = snap.docs.map((s) => {
        const d = s.data();
        const name = d.fullName || d.companyName || 'Unknown';
        const initial = (name[0] || '?').toUpperCase();
        const role = d.role || 'user';
        const photoUrl = role === 'company' ? (d.logo || d.companyLogo) : (d.profileImage || d.photoURL);
        const isCompany = role === 'company';
        const avatarClass = isCompany ? 'user-avatar logo-contain' : 'user-avatar';
        const avatar = photoUrl
          ? `<div class="${avatarClass}"><img src="${esc(photoUrl)}" alt="${esc(initial)}" onerror="this.parentNode.innerHTML='${esc(initial)}';this.parentNode.style.background='${roleBg(role)}';this.parentNode.style.color='${roleColor(role)}';"></div>`
          : `<div class="${avatarClass}" style="background:${roleBg(role)};color:${roleColor(role)}">${esc(initial)}</div>`;
        return `<div class="user-row" data-user-id="${esc(s.id)}" role="button" tabindex="0" style="cursor:pointer;">
          ${avatar}
          <div class="row-body">
            <div class="row-title">${esc(name)}</div>
            <div class="row-sub">${esc(d.email || '')}</div>
          </div>
          <div class="badge badge-${roleBadge(role)}">${esc(role)}</div>
        </div>`;
      }).join('');
      el.querySelectorAll('.user-row').forEach((row) => {
        const id = row.getAttribute('data-user-id');
        row.addEventListener('click', () => openDetailsModal('user', id));
      });
    }
    async function renderRecentOpps() {
      const snap = await getDocs(query(collection(db, 'opportunities'), orderBy('createdAt', 'desc'), limit(5)));
      const el = document.getElementById('recent-opps');
      if (snap.empty) {
        el.innerHTML = emptyStateHtml('No opportunities yet.', { title: 'Empty', icon: 'briefcase' });
        return;
      }
      el.innerHTML = snap.docs.map((s) => {
        const d = s.data();
        const subType = d.type || d.opportunityType || 'opportunity';
        const logo = d.companyLogo || d.logo || '';
        const avatar = logo
          ? `<div class="user-avatar" style="border-radius:10px;background:#F8FAFF;"><img src="${esc(logo)}" alt="" onerror="this.parentNode.innerHTML='<i data-lucide=\\'${typeIcon('opportunity', subType)}\\'></i>';this.parentNode.style.background='rgba(245,158,11,0.12)';this.parentNode.style.color='#F59E0B';window.lucide&&window.lucide.createIcons();"></div>`
          : `<div class="activity-icon" style="background:rgba(245,158,11,0.12);color:#F59E0B"><i data-lucide="${typeIcon('opportunity', subType)}"></i></div>`;
        return `<div class="item-row" data-opp-id="${esc(s.id)}" role="button" tabindex="0" style="cursor:pointer;">
          ${avatar}
          <div class="row-body">
            <div class="row-title">${esc(d.title || 'Untitled')}</div>
            <div class="row-sub">${esc(d.companyName || '—')} · ${esc(d.location || '—')} · ${esc(typeLabel(subType))}</div>
          </div>
          <div class="activity-time">${esc(formatTimestamp(d.createdAt))}</div>
        </div>`;
      }).join('');
      el.querySelectorAll('.item-row').forEach((row) => {
        const id = row.getAttribute('data-opp-id');
        row.addEventListener('click', () => openDetailsModal('opportunity', id));
      });
    }
    function roleColor(r) { return r==='student'?'#2563EB':r==='company'?'#14B8A6':r==='admin'?'#F59E0B':'#64748B'; }
    function roleBg(r) { return roleColor(r) + '1a'; }
    function roleBadge(r) { return r==='student'?'info':r==='company'?'success':r==='admin'?'warning':'primary'; }
  </script>
</body>
</html>
