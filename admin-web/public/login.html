<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FutureGate Admin - Login</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">🛡️</div>
      <h1>Admin Panel</h1>
      <p>FutureGate Management</p>
    </div>
    <div id="error-msg" class="error-msg"></div>
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="admin@example.com" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary" id="login-btn">Login</button>
    </form>
  </div>

  <script type="module">
    import { auth, db, signInWithEmailAndPassword, onAuthStateChanged, doc, getDoc } from './js/firebase-config.js';

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        try {
          const userDoc = await getDoc(doc(db, 'users', user.uid));
          if (
            userDoc.exists() &&
            userDoc.data().role === 'admin' &&
            userDoc.data().isActive !== false
          ) {
            window.location.href = '/index.html';
            return;
          }
        } catch (e) {
          console.warn('Auto-login check failed:', e);
        }
      }
    });

    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const loginBtn = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';
      errorMsg.classList.remove('show');

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        const userDoc = await getDoc(doc(db, 'users', cred.user.uid));
        if (
          !userDoc.exists() ||
          userDoc.data().role !== 'admin' ||
          userDoc.data().isActive === false
        ) {
          await auth.signOut();
          errorMsg.textContent = 'Access denied. Active admin accounts only.';
          errorMsg.classList.add('show');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
          return;
        }
        window.location.href = '/index.html';
      } catch (err) {
        let msg = 'Login failed. Please try again.';
        if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
          msg = 'Invalid email or password.';
        } else if (err.code === 'auth/too-many-requests') {
          msg = 'Too many attempts. Please try later.';
        }
        errorMsg.textContent = msg;
        errorMsg.classList.add('show');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
