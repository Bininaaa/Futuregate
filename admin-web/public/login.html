<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="login.title" data-i18n-fallback="Sign in · FutureGate Admin">Sign in · FutureGate Admin</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/app.css?v=2026042603">
  <link rel="stylesheet" href="css/i18n.css?v=2026043001">
  <script src="js/theme-init.js"></script>
  <script src="js/lang-init.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="login-shell">
    <form class="login-card" id="login-form" autocomplete="on">
      <div class="login-brand">
        <div class="login-brand-icon"><i data-lucide="shield-check"></i></div>
        <h1 data-i18n="login.heading" data-i18n-fallback="FutureGate Admin">FutureGate Admin</h1>
        <p data-i18n="login.subheading" data-i18n-fallback="Sign in with your admin account.">Sign in with your admin account.</p>
      </div>

      <div class="form-row">
        <label for="email" data-i18n="login.email" data-i18n-fallback="Email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="email" placeholder="you@futuregate.com">
      </div>
      <div class="form-row">
        <label for="password" data-i18n="login.password" data-i18n-fallback="Password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="••••••••">
      </div>

      <div id="error" style="display:none; margin-bottom: 14px;"></div>

      <button type="submit" class="btn btn-primary" id="submit-btn" style="width: 100%; justify-content: center;">
        <i data-lucide="log-in"></i>
        <span data-i18n="login.submit" data-i18n-fallback="Sign in">Sign in</span>
      </button>
    </form>
  </div>

  <script type="module">
    import { auth, db, signInWithEmailAndPassword, onAuthStateChanged, doc, getDoc } from './js/firebase-config.js';
    import { feedbackCardHtml } from './js/auth.js';
    import { t, applyTranslations } from './js/i18n.js';
    import './js/ui.js';

    applyTranslations();

    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error');
    const submitBtn = document.getElementById('submit-btn');
    let submitting = false;

    function showError(message) {
      errorBox.style.display = 'block';
      errorBox.innerHTML = feedbackCardHtml(message, { type: 'error', title: t('login.failed', 'Sign-in failed') });
      if (window.lucide) window.lucide.createIcons();
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user || submitting) return;
      try {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (userDoc.exists() && userDoc.data().role === 'admin' && userDoc.data().isActive !== false) {
          window.location.replace('/');
        }
      } catch (error) {
        console.warn('Existing admin session check failed:', error);
      }
    });

    document.addEventListener('languagechange', () => {
      applyTranslations();
      if (!submitting) submitBtn.querySelector('span').textContent = t('login.submit', 'Sign in');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';
      submitting = true;
      submitBtn.disabled = true;
      submitBtn.querySelector('span').textContent = t('login.signingIn', 'Signing in...');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        const userDoc = await getDoc(doc(db, 'users', cred.user.uid));
        if (!userDoc.exists() || userDoc.data().role !== 'admin') {
          await auth.signOut();
          throw new Error(t('login.notAdmin', 'This account is not an admin.'));
        }
        if (userDoc.data().isActive === false) {
          await auth.signOut();
          throw new Error(t('login.inactive', 'Your admin account is inactive.'));
        }
        window.location.replace('/');
      } catch (err) {
        const code = err?.code || '';
        let msg = err?.message || t('login.cantSignIn', 'Could not sign in.');
        if (code === 'auth/invalid-credential' || code === 'auth/wrong-password' || code === 'auth/user-not-found') {
          msg = t('login.wrongCreds', 'Wrong email or password.');
        } else if (code === 'auth/too-many-requests') {
          msg = t('login.tooMany', 'Too many attempts. Try again later.');
        } else if (code === 'auth/network-request-failed') {
          msg = t('login.network', 'Network error. Check your connection.');
        }
        showError(msg);
        submitting = false;
        submitBtn.disabled = false;
        submitBtn.querySelector('span').textContent = t('login.submit', 'Sign in');
      }
    });
  </script>
</body>
</html>
