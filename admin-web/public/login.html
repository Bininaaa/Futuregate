<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · FutureGate Admin</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/app.css?v=2026042603">
  <script src="js/theme-init.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="login-shell">
    <form class="login-card" id="login-form" autocomplete="on">
      <div class="login-brand">
        <div class="login-brand-icon"><i data-lucide="shield-check"></i></div>
        <h1>FutureGate Admin</h1>
        <p>Sign in with your admin account.</p>
      </div>

      <div class="form-row">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="email" placeholder="you@futuregate.com">
      </div>
      <div class="form-row">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="••••••••">
      </div>

      <div id="error" style="display:none; margin-bottom: 14px;"></div>

      <button type="submit" class="btn btn-primary" id="submit-btn" style="width: 100%; justify-content: center;">
        <i data-lucide="log-in"></i>
        <span>Sign in</span>
      </button>
    </form>
  </div>

  <script type="module">
    import { auth, db, signInWithEmailAndPassword, onAuthStateChanged, doc, getDoc } from './js/firebase-config.js';
    import { feedbackCardHtml } from './js/auth.js';
    import './js/ui.js';

    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error');
    const submitBtn = document.getElementById('submit-btn');
    let submitting = false;

    function showError(message) {
      errorBox.style.display = 'block';
      errorBox.innerHTML = feedbackCardHtml(message, { type: 'error', title: 'Sign-in failed' });
      if (window.lucide) window.lucide.createIcons();
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user || submitting) return;
      try {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (userDoc.exists() && userDoc.data().role === 'admin' && userDoc.data().isActive !== false) {
          window.location.replace('/index.html');
        }
      } catch (error) {
        console.warn('Existing admin session check failed:', error);
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';
      submitting = true;
      submitBtn.disabled = true;
      submitBtn.querySelector('span').textContent = 'Signing in...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        const userDoc = await getDoc(doc(db, 'users', cred.user.uid));
        if (!userDoc.exists() || userDoc.data().role !== 'admin') {
          await auth.signOut();
          throw new Error('This account is not an admin.');
        }
        if (userDoc.data().isActive === false) {
          await auth.signOut();
          throw new Error('Your admin account is inactive.');
        }
        window.location.replace('/index.html');
      } catch (err) {
        const code = err?.code || '';
        let msg = err?.message || 'Could not sign in.';
        if (code === 'auth/invalid-credential' || code === 'auth/wrong-password' || code === 'auth/user-not-found') {
          msg = 'Wrong email or password.';
        } else if (code === 'auth/too-many-requests') {
          msg = 'Too many attempts. Try again later.';
        } else if (code === 'auth/network-request-failed') {
          msg = 'Network error. Check your connection.';
        }
        showError(msg);
        submitting = false;
        submitBtn.disabled = false;
        submitBtn.querySelector('span').textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
