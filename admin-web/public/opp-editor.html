<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opportunity editor &middot; FutureGate Admin</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css?v=2026042602">
  <script src="js/theme-init.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="opp-editor">
  <div id="auth-gate" class="auth-gate"><div class="spinner"></div><p>Verifying session...</p></div>
  <div id="shell"></div>

  <script type="module">
    import { mountShell, showPage } from './js/shell.js';
    import { checkAuth, esc, showToast } from './js/auth.js';
    import {
      auth, db, collection, doc, getDoc, setDoc, updateDoc, serverTimestamp,
    } from './js/firebase-config.js';
    import { getQueryParam } from './js/admin-utils.js';
    import { WORKER_BASE_URL } from './js/google-books-config.js';

    mountShell({ page: 'content' });
    checkAuth(async () => { await initPage(); });

    const id = getQueryParam('id') || '';
    const isNew = !id;
    let item = null;

    const ADMIN_NAME = 'FutureGate Editorial Desk';
    const TYPES = [['job', 'Job'], ['internship', 'Internship'], ['sponsoring', 'Sponsoring / Funding']];
    const LANGS = [['fr', 'French'], ['en', 'English'], ['ar', 'Arabic']];
    const PERIODS = [['monthly', 'Monthly'], ['yearly', 'Yearly'], ['hourly', 'Hourly'], ['daily', 'Daily']];
    const EMPLOYMENT = [
      ['full_time', 'Full-time'],
      ['part_time', 'Part-time'],
      ['internship', 'Internship'],
      ['contract', 'Contract'],
      ['temporary', 'Temporary'],
      ['freelance', 'Freelance'],
    ];
    const WORK_MODES = [['onsite', 'On-site'], ['remote', 'Remote'], ['hybrid', 'Hybrid']];
    const CURRENCIES = ['DZD', 'EUR', 'USD'];

    async function workerBestEffort(path, body) {
      try {
        const token = auth.currentUser ? await auth.currentUser.getIdToken() : '';
        await fetch(`${WORKER_BASE_URL}${path}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify(body || {}),
        });
      } catch (error) {
        console.warn('Worker side effect failed:', path, error);
      }
    }

    async function initPage() {
      if (!isNew) {
        try {
          const snap = await getDoc(doc(db, 'opportunities', id));
          if (snap.exists()) item = { id: snap.id, ...snap.data() };
        } catch (error) {
          console.error(error);
        }
      }
      if (!isNew && item && !canEditExistingOpportunity()) {
        renderBlocked('You can only edit opportunities you posted as admin.');
        showPage();
        return;
      }
      render();
      showPage();
    }

    function canEditExistingOpportunity() {
      const adminId = String(auth.currentUser?.uid || '').trim();
      return !!adminId &&
        String(item?.createdByRole || '').trim().toLowerCase() === 'admin' &&
        String(item?.companyId || '').trim() === adminId;
    }

    function renderBlocked(message) {
      const root = document.getElementById('page-content');
      root.innerHTML = `
        <section class="surface-panel">
          <div class="surface-heading">
            <div>
              <div class="surface-heading-title">Opportunity unavailable</div>
              <div class="surface-heading-copy">${esc(message)}</div>
            </div>
          </div>
          <a href="moderation.html?tab=opportunities" class="btn btn-primary"><i data-lucide="arrow-left"></i>Back to opportunities</a>
        </section>
      `;
      if (window.lucide) window.lucide.createIcons();
    }

    function val(id) {
      return (document.getElementById(id)?.value || '').trim();
    }

    function splitLines(text) {
      return String(text || '')
        .split(/\r?\n/)
        .map((entry) => entry.trim())
        .filter(Boolean);
    }

    function joinLines(values) {
      if (Array.isArray(values)) {
        return values.join('\n');
      }
      return String(values || '').trim();
    }

    function parseDateLike(value) {
      if (!value) return null;
      if (typeof value.toDate === 'function') return value.toDate();
      if (value instanceof Date) return value;
      if (typeof value.seconds === 'number') return new Date(value.seconds * 1000);
      const parsed = Date.parse(value);
      return Number.isNaN(parsed) ? null : new Date(parsed);
    }

    function toDateInput(value) {
      const date = parseDateLike(value);
      return date ? date.toISOString().slice(0, 10) : '';
    }

    function parseNumber(text) {
      const normalized = String(text || '').replace(/[^0-9.\-]/g, '').trim();
      if (!normalized) return null;
      const parsed = Number(normalized);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function deadlineIsPast(dateValue) {
      if (!dateValue) return false;
      const deadline = new Date(`${dateValue}T00:00:00`);
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      return deadline < today;
    }

    function toEndOfDay(dateValue) {
      return dateValue ? new Date(`${dateValue}T23:59:59.999`) : null;
    }

    function sectionBlock(title, icon, html) {
      return `<section class="editor-section">
        <header class="editor-section__head">
          <div class="editor-section__icon"><i data-lucide="${icon}"></i></div>
          <h3>${esc(title)}</h3>
        </header>
        <div class="editor-section__body">${html}</div>
      </section>`;
    }

    function render() {
      const root = document.getElementById('page-content');
      const opportunityType = item?.type || item?.opportunityType || 'job';
      const deadline = toDateInput(item?.applicationDeadline || item?.deadline);
      const requirements = item?.requirementItems?.length
        ? item.requirementItems
        : item?.requirements;
      const defaultPublisher = String(item?.companyName || ADMIN_NAME).trim() || ADMIN_NAME;

      root.innerHTML = `
        <div class="page-breadcrumb">
          <a href="moderation.html?tab=opportunities" class="btn btn-ghost"><i data-lucide="arrow-left"></i>Back to content</a>
        </div>
        <header class="page-hero">
          <div>
            <div class="editor-mode-badge ${isNew ? '' : 'is-edit'}"><i data-lucide="${isNew ? 'plus' : 'pencil'}"></i>${isNew ? 'New post' : 'Editing post'}</div>
            <h1 class="page-hero__title">${isNew ? 'Publish Opportunity' : 'Edit Opportunity'}</h1>
            <p class="page-hero__subtitle">${isNew ? 'Create a professional opportunity post students will discover in the app.' : 'Refine this opportunity with cleaner structure and stronger student-facing detail.'}</p>
          </div>
          <div class="page-hero__actions">
            <button class="btn" id="cancel-btn"><i data-lucide="x"></i>Cancel</button>
            <button class="btn btn-primary" id="save-btn"><i data-lucide="save"></i>${isNew ? 'Publish' : 'Save Changes'}</button>
          </div>
        </header>

        <div class="editor-grid">
          ${sectionBlock('Basic Information', 'info', `
            <div class="form-grid-2">
              <div class="form-row"><label>Publisher Name *</label><input id="f-company" type="text" placeholder="${ADMIN_NAME}" value="${esc(defaultPublisher)}"></div>
              <div class="form-row"><label>Status *</label>
                <select id="f-status">
                  <option value="open" ${(item?.status || 'open') === 'open' ? 'selected' : ''}>Open</option>
                  <option value="closed" ${item?.status === 'closed' ? 'selected' : ''}>Closed</option>
                </select>
              </div>
              <div class="form-row"><label>Title *</label><input id="f-title" type="text" placeholder="e.g. Frontend Developer Internship" value="${esc(item?.title || '')}"></div>
              <div class="form-row"><label>Language</label>
                <select id="f-lang">${LANGS.map(([value, label]) => `<option value="${value}" ${((item?.originalLanguage || 'fr') === value) ? 'selected' : ''}>${label}</option>`).join('')}</select>
              </div>
              <div class="form-row"><label>Type *</label>
                <select id="f-type">${TYPES.map(([value, label]) => `<option value="${value}" ${opportunityType === value ? 'selected' : ''}>${label}</option>`).join('')}</select>
              </div>
              <div class="form-row"><label>Location *</label><input id="f-location" type="text" placeholder="e.g. Algiers / Remote" value="${esc(item?.location || '')}"></div>
            </div>
          `)}

          ${sectionBlock('Description', 'file-text', `
            <div class="form-row"><label>Description *</label><textarea id="f-description" rows="6" placeholder="Describe the role, its scope, and what the candidate will gain.">${esc(item?.description || '')}</textarea></div>
          `)}

          ${sectionBlock('Requirements', 'list-checks', `
            <div class="form-row">
              <label>Requirements *</label>
              <textarea id="f-requirements" rows="5" placeholder="One requirement per line&#10;e.g. Bachelor's degree in Computer Science&#10;Strong communication skills">${esc(joinLines(requirements))}</textarea>
              <div class="form-hint">Enter each requirement on a new line.</div>
            </div>
          `)}

          ${sectionBlock('Logistics & Compensation', 'calendar', `
            <div class="form-grid-2">
              <div class="form-row"><label>Application Deadline *</label><input id="f-deadline" type="date" value="${esc(deadline)}"></div>
            </div>
            <div id="type-fields" style="margin-top:14px;"></div>
          `)}
        </div>

        <div class="page-hero__actions" style="justify-content:flex-end;margin-top:18px;">
          <button class="btn" id="cancel-btn-2"><i data-lucide="x"></i>Cancel</button>
          <button class="btn btn-primary" id="save-btn-2"><i data-lucide="save"></i>${isNew ? 'Publish' : 'Save Changes'}</button>
        </div>
      `;

      document.getElementById('cancel-btn').onclick = back;
      document.getElementById('cancel-btn-2').onclick = back;
      document.getElementById('save-btn').onclick = save;
      document.getElementById('save-btn-2').onclick = save;
      document.getElementById('f-type').addEventListener('change', renderTypeFields);
      renderTypeFields();
      if (window.lucide) window.lucide.createIcons();
    }

    function renderTypeFields() {
      const type = val('f-type') || 'job';
      const target = document.getElementById('type-fields');
      const salaryCurrency = item?.salaryCurrency || item?.fundingCurrency || CURRENCIES[0];
      const salaryPeriod = item?.salaryPeriod || PERIODS[0][0];
      const employmentType = item?.employmentType || (type === 'internship' ? 'internship' : EMPLOYMENT[0][0]);
      const workMode = item?.workMode || WORK_MODES[0][0];
      const isPaid = item?.isPaid;

      if (type === 'sponsoring') {
        target.innerHTML = `
          <div class="form-grid-2">
            <div class="form-row"><label>Funding Amount</label><input id="f-fundingAmount" type="text" placeholder="e.g. 250000" value="${esc(item?.fundingAmount ?? item?.salaryMin ?? '')}"></div>
            <div class="form-row"><label>Funding Currency</label>
              <select id="f-fundingCurrency">${CURRENCIES.map((currency) => `<option value="${currency}" ${salaryCurrency === currency ? 'selected' : ''}>${currency}</option>`).join('')}</select>
            </div>
            <div class="form-row" style="grid-column:1/-1;"><label>Funding Note</label><textarea id="f-fundingNote" rows="3" placeholder="Optional support details shown to students">${esc(item?.fundingNote || item?.compensationText || '')}</textarea></div>
          </div>
        `;
      } else {
        target.innerHTML = `
          <div class="form-grid-2">
            <div class="form-row"><label>Salary Minimum</label><input id="f-salaryMin" type="text" placeholder="e.g. 60 000" value="${esc(item?.salaryMin ?? '')}"></div>
            <div class="form-row"><label>Salary Maximum</label><input id="f-salaryMax" type="text" placeholder="e.g. 90 000" value="${esc(item?.salaryMax ?? '')}"></div>
            <div class="form-row"><label>Currency</label>
              <select id="f-salaryCurrency">${CURRENCIES.map((currency) => `<option value="${currency}" ${salaryCurrency === currency ? 'selected' : ''}>${currency}</option>`).join('')}</select>
            </div>
            <div class="form-row"><label>Salary Period</label>
              <select id="f-salaryPeriod">${PERIODS.map(([value, label]) => `<option value="${value}" ${salaryPeriod === value ? 'selected' : ''}>${label}</option>`).join('')}</select>
            </div>
            <div class="form-row"><label>Employment Type</label>
              <select id="f-employmentType">${EMPLOYMENT.map(([value, label]) => `<option value="${value}" ${employmentType === value ? 'selected' : ''}>${label}</option>`).join('')}</select>
            </div>
            <div class="form-row"><label>Work Mode</label>
              <select id="f-workMode">${WORK_MODES.map(([value, label]) => `<option value="${value}" ${workMode === value ? 'selected' : ''}>${label}</option>`).join('')}</select>
            </div>
            <div class="form-row"><label>Paid Status</label>
              <select id="f-isPaid">
                <option value="" ${isPaid === undefined || isPaid === null ? 'selected' : ''}>Select status</option>
                <option value="true" ${isPaid === true ? 'selected' : ''}>Paid</option>
                <option value="false" ${isPaid === false ? 'selected' : ''}>Unpaid</option>
              </select>
            </div>
            ${type === 'internship' ? `<div class="form-row"><label>Duration</label><input id="f-duration" type="text" placeholder="e.g. 3 months" value="${esc(item?.duration || '')}"></div>` : ''}
            <div class="form-row" style="grid-column:1/-1;"><label>Compensation Note</label><textarea id="f-compensationText" rows="3" placeholder="Optional details shown to students (e.g. benefits, allowances)">${esc(item?.compensationText || '')}</textarea></div>
          </div>
        `;
      }

      if (window.lucide) window.lucide.createIcons();
    }

    function back() {
      window.location.href = 'moderation.html?tab=opportunities';
    }

    function validatePayload(basePayload) {
      if (!basePayload.companyName || !basePayload.title || !basePayload.location || !basePayload.description) {
        showToast('Publisher, title, location, and description are required.', 'warning');
        return false;
      }
      if (!basePayload.deadline) {
        showToast('Application deadline is required.', 'warning');
        return false;
      }
      if (deadlineIsPast(basePayload.deadline)) {
        showToast('Deadline cannot be in the past.', 'warning');
        return false;
      }
      if (!basePayload.requirementItems.length) {
        showToast(basePayload.type === 'sponsoring' ? 'Add at least one eligibility item.' : 'Add at least one requirement.', 'warning');
        return false;
      }

      if (basePayload.type === 'sponsoring') {
        const fundingAmount = parseNumber(val('f-fundingAmount'));
        const fundingNote = val('f-fundingNote');
        if (val('f-fundingAmount') && fundingAmount === null) {
          showToast('Enter a valid funding amount.', 'warning');
          return false;
        }
        if (!val('f-fundingAmount') && !fundingNote) {
          showToast('Add a funding amount or note.', 'warning');
          return false;
        }
      } else {
        const salaryMin = parseNumber(val('f-salaryMin'));
        const salaryMax = parseNumber(val('f-salaryMax'));
        if (val('f-salaryMin') && salaryMin === null) {
          showToast('Enter a valid salary minimum.', 'warning');
          return false;
        }
        if (val('f-salaryMax') && salaryMax === null) {
          showToast('Enter a valid salary maximum.', 'warning');
          return false;
        }
        if (salaryMin !== null && salaryMax !== null && salaryMax < salaryMin) {
          showToast('Salary max must be at least salary min.', 'warning');
          return false;
        }
      }

      return true;
    }

    async function save() {
      const type = val('f-type') || 'job';
      const uid = String(auth.currentUser?.uid || '').trim();
      const deadline = val('f-deadline');
      const requirementItems = splitLines(val('f-requirements'));
      const payload = {
        companyId: uid,
        companyName: val('f-company') || ADMIN_NAME,
        companyLogo: String(auth.currentUser?.photoURL || item?.companyLogo || '').trim(),
        createdBy: uid,
        createdByRole: 'admin',
        title: val('f-title'),
        description: val('f-description'),
        type,
        location: val('f-location'),
        requirements: requirementItems.join('\n'),
        requirementItems,
        status: val('f-status') || 'open',
        deadline,
        applicationDeadline: toEndOfDay(deadline),
        salaryMin: null,
        salaryMax: null,
        salaryCurrency: null,
        salaryPeriod: null,
        compensationText: null,
        fundingAmount: null,
        fundingCurrency: null,
        fundingNote: null,
        employmentType: null,
        workMode: null,
        isPaid: null,
        duration: null,
        originalLanguage: val('f-lang') || 'fr',
        updatedAt: serverTimestamp(),
      };

      if (!validatePayload(payload)) {
        return;
      }

      if (type === 'sponsoring') {
        payload.fundingAmount = parseNumber(val('f-fundingAmount'));
        payload.fundingCurrency = val('f-fundingCurrency') || CURRENCIES[0];
        payload.fundingNote = val('f-fundingNote');
      } else {
        payload.salaryMin = parseNumber(val('f-salaryMin'));
        payload.salaryMax = parseNumber(val('f-salaryMax'));
        payload.salaryCurrency = val('f-salaryCurrency') || CURRENCIES[0];
        payload.salaryPeriod = val('f-salaryPeriod') || PERIODS[0][0];
        payload.compensationText = val('f-compensationText');
        payload.employmentType = type === 'internship'
          ? (val('f-employmentType') || 'internship')
          : val('f-employmentType');
        payload.workMode = val('f-workMode');
        payload.isPaid = val('f-isPaid') === '' ? null : val('f-isPaid') === 'true';
        payload.duration = type === 'internship' ? val('f-duration') : null;
      }

      const saveButtons = [document.getElementById('save-btn'), document.getElementById('save-btn-2')];
      saveButtons.forEach((button) => {
        if (button) button.disabled = true;
      });

      try {
        if (isNew) {
          const ref = doc(collection(db, 'opportunities'));
          const created = {
            ...payload,
            id: ref.id,
            createdAt: serverTimestamp(),
          };
          await setDoc(ref, created);
          await workerBestEffort('/api/notify/opportunity', { opportunityId: ref.id });
          showToast('Admin opportunity published.', 'success');
        } else {
          await updateDoc(doc(db, 'opportunities', id), payload);
          await workerBestEffort('/api/notify/opportunity', { opportunityId: id });
          showToast('Admin opportunity updated.', 'success');
        }
        back();
      } catch (error) {
        console.error(error);
        showToast('Save failed: ' + (error?.message || error), 'error');
        saveButtons.forEach((button) => {
          if (button) button.disabled = false;
        });
      }
    }
  </script>
</body>
</html>
