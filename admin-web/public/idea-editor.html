<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="editor.idea.title" data-i18n-fallback="Idea editor · FutureGate Admin">Idea editor &middot; FutureGate Admin</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css?v=2026042603">
  <link rel="stylesheet" href="css/i18n.css?v=2026043001">
  <script src="js/theme-init.js"></script>
  <script src="js/lang-init.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="idea-editor">
  <div id="auth-gate" class="auth-gate"><div class="spinner"></div><p data-i18n="shell.verifyingSession" data-i18n-fallback="Verifying session...">Verifying session...</p></div>
  <div id="shell"></div>

  <script type="module">
    import { mountShell, showPage } from './js/shell.js';
    import { checkAuth, esc, showToast } from './js/auth.js';
    import {
      auth, db, collection, doc, getDoc, setDoc, updateDoc, serverTimestamp,
    } from './js/firebase-config.js';
    import { getQueryParam } from './js/admin-utils.js';
    import { logAdminActivity } from './js/activity-service.js';
    import { t, applyTranslations } from './js/i18n.js';

    mountShell({ page: 'content' });
    checkAuth(async () => { await initPage(); });

    const id = getQueryParam('id') || '';
    const isNew = !id;
    let item = null;
    let ideaStatus = 'approved';

    const ADMIN_NAME = 'FutureGate Editorial Desk';
    const LANGS = [['fr', 'French'], ['en', 'English'], ['ar', 'Arabic']];
    const LEVELS = [
      ['bac', 'Bac'],
      ['licence', 'Licence'],
      ['master', 'Master'],
      ['doctorat', 'Doctorat'],
    ];

    document.addEventListener('languagechange', () => {
      try { applyTranslations(document); } catch {}
      try { render(); } catch {}
    });

    async function initPage() {
      if (!isNew) {
        try {
          const snap = await getDoc(doc(db, 'projectIdeas', id));
          if (snap.exists()) item = { id: snap.id, ...snap.data() };
        } catch (error) {
          console.error(error);
        }
      }
      ideaStatus = item?.status === 'pending' ? 'pending' : 'approved';
      if (!isNew && item && !canEditExistingIdea()) {
        renderBlocked(t('editor.idea.canEditOnlyOwn', 'You can only edit ideas you posted as admin.'));
        showPage();
        return;
      }
      render();
      showPage();
    }

    function canEditExistingIdea() {
      const adminId = String(auth.currentUser?.uid || '').trim();
      return !!adminId && String(item?.submittedBy || '').trim() === adminId;
    }

    function renderBlocked(message) {
      const root = document.getElementById('page-content');
      root.innerHTML = `
        <section class="surface-panel">
          <div class="surface-heading">
            <div>
              <div class="surface-heading-title">${esc(t('editor.idea.unavailable', 'Idea unavailable'))}</div>
              <div class="surface-heading-copy">${esc(message)}</div>
            </div>
          </div>
          <a href="moderation?tab=ideas" class="btn btn-primary"><i data-lucide="arrow-left"></i>${esc(t('editor.backToIdeas', 'Back to ideas'))}</a>
        </section>
      `;
      if (window.lucide) window.lucide.createIcons();
    }

    function val(id) {
      return (document.getElementById(id)?.value || '').trim();
    }

    function splitCsv(text) {
      return String(text || '')
        .split(',')
        .map((entry) => entry.trim())
        .filter(Boolean);
    }

    function joinCsv(values) {
      return Array.isArray(values) ? values.join(', ') : '';
    }

    function normalizeExternalUrl(value) {
      const href = String(value || '').trim();
      if (!href) return '';
      if (/^(https?:|mailto:|tel:)/i.test(href)) return href;
      if (href.startsWith('//')) return `https:${href}`;
      return `https://${href.replace(/^\/+/, '')}`;
    }

    function sectionBlock(title, icon, html) {
      return `<section class="editor-section">
        <header class="editor-section__head">
          <div class="editor-section__icon"><i data-lucide="${icon}"></i></div>
          <h3>${esc(title)}</h3>
        </header>
        <div class="editor-section__body">${html}</div>
      </section>`;
    }

    function render() {
      const root = document.getElementById('page-content');
      const isHidden = item?.isHidden === true || item?.status === 'rejected';
      const level = String(item?.level || 'licence').trim() || 'licence';

      const langOpts = LANGS.map(([value, fallback]) =>
        `<option value="${value}" ${((item?.originalLanguage || 'fr') === value) ? 'selected' : ''}>${esc(t('editor.lang.' + value, fallback))}</option>`,
      ).join('');
      const levelOpts = LEVELS.map(([value, label]) =>
        `<option value="${value}" ${level === value ? 'selected' : ''}>${esc(label)}</option>`,
      ).join('');

      root.innerHTML = `
        <div class="page-breadcrumb">
          <a href="moderation?tab=ideas" class="btn btn-ghost"><i data-lucide="arrow-left"></i>${esc(t('editor.backToContent', 'Back to content'))}</a>
        </div>
        <header class="page-hero">
          <div>
            <div class="editor-mode-badge ${isNew ? '' : 'is-edit'}"><i data-lucide="${isNew ? 'plus' : 'pencil'}"></i>${esc(isNew ? t('editor.newPost', 'New post') : t('editor.editingPost', 'Editing post'))}</div>
            <h1 class="page-hero__title">${esc(isNew ? t('editor.idea.publishHeading', 'Publish Idea') : t('editor.idea.editHeading', 'Edit Idea'))}</h1>
            <p class="page-hero__subtitle">${esc(isNew ? t('editor.idea.subtitleNew', 'Create a project idea post students can discover with clear context and strong discovery metadata.') : t('editor.idea.subtitleEdit', 'Refine this idea with cleaner copy, stronger discovery metadata, and sharper structure.'))}</p>
          </div>
          <div class="page-hero__actions">
            <button class="btn" id="cancel-btn"><i data-lucide="x"></i>${esc(t('editor.cancel', 'Cancel'))}</button>
            <button class="btn btn-primary" id="save-btn"><i data-lucide="save"></i>${esc(isNew ? t('editor.publish', 'Publish') : t('editor.saveChanges', 'Save Changes'))}</button>
          </div>
        </header>

        <div class="editor-grid">
          ${sectionBlock(t('editor.section.publishing', 'Publishing'), 'eye', `
            <div class="toggle-group">
              <label class="toggle-option ${!isHidden ? 'is-active' : ''}">
                <input id="f-visible" type="radio" name="idea-visibility" ${!isHidden ? 'checked' : ''}>
                <i data-lucide="eye"></i>${esc(t('editor.option.visible', 'Visible'))}
              </label>
              <label class="toggle-option ${isHidden ? 'is-active' : ''}">
                <input id="f-hidden" type="radio" name="idea-visibility" ${isHidden ? 'checked' : ''}>
                <i data-lucide="eye-off"></i>${esc(t('editor.option.hidden', 'Hidden'))}
              </label>
            </div>
          `)}

          ${sectionBlock(t('editor.section.coreStory', 'Core Story'), 'book-open', `
            <div class="form-row"><label>${esc(t('editor.field.ideaTitle', 'Idea Title *'))}</label><input id="f-title" type="text" placeholder="e.g. Campus Innovation Partner Program" value="${esc(item?.title || '')}"></div>
            <div class="form-row"><label>${esc(t('editor.field.tagline', 'Tagline'))}</label><input id="f-tagline" type="text" placeholder="One-line hook shown in the discovery feed" value="${esc(item?.tagline || '')}"></div>
            <div class="form-row"><label>${esc(t('editor.field.ideaOverview', 'Idea Overview *'))}</label><textarea id="f-description" rows="6" placeholder="Describe the concept, what it does, and how it comes to life.">${esc(item?.description || item?.shortDescription || '')}</textarea></div>
          `)}

          ${sectionBlock(t('editor.section.metadataDiscovery', 'Metadata & Discovery'), 'tag', `
            <div class="form-grid-2">
              <div class="form-row"><label>${esc(t('editor.field.category', 'Category'))} *</label><input id="f-category" type="text" placeholder="e.g. EdTech, AI, Sustainability" value="${esc(item?.category || item?.domain || '')}"></div>
              <div class="form-row"><label>${esc(t('editor.field.academicLevel', 'Academic Level'))}</label>
                <select id="f-level">${levelOpts}</select>
              </div>
              <div class="form-row"><label>${esc(t('editor.field.language', 'Language'))}</label>
                <select id="f-lang">${langOpts}</select>
              </div>
              <div class="form-row"><label>${esc(t('editor.field.stage', 'Stage'))}</label><input id="f-stage" type="text" placeholder="e.g. Concept, Prototype, Pilot" value="${esc(item?.stage || '')}"></div>
              <div class="form-row"><label>${esc(t('editor.field.skillsNeeded', 'Skills Needed'))}</label><input id="f-skillsNeeded" type="text" placeholder="Comma-separated skills" value="${esc(joinCsv(item?.skillsNeeded?.length ? item.skillsNeeded : splitCsv(item?.tools)))}"></div>
              <div class="form-row"><label>${esc(t('editor.field.teamRoles', 'Team Roles Needed'))}</label><input id="f-teamNeeded" type="text" placeholder="Comma-separated roles" value="${esc(joinCsv(item?.teamNeeded))}"></div>
              <div class="form-row" style="grid-column:1/-1;"><label>${esc(t('editor.field.targetAudience', 'Target Audience'))}</label><textarea id="f-targetAudience" rows="3" placeholder="Who benefits most from this idea?">${esc(item?.targetAudience || '')}</textarea></div>
              <div class="form-row" style="grid-column:1/-1;"><label>${esc(t('editor.field.problemStatement', 'Problem Statement'))}</label><textarea id="f-problemStatement" rows="4" placeholder="What specific challenge does this idea solve?">${esc(item?.problemStatement || '')}</textarea></div>
              <div class="form-row" style="grid-column:1/-1;"><label>${esc(t('editor.field.solution', 'Proposed Solution'))}</label><textarea id="f-solution" rows="4" placeholder="How does the idea address the problem?">${esc(item?.solution || '')}</textarea></div>
              <div class="form-row" style="grid-column:1/-1;"><label>${esc(t('editor.field.resourcesNeeded', 'Resources Needed'))}</label><textarea id="f-resourcesNeeded" rows="3" placeholder="What support, partners, or assets are required?">${esc(item?.resourcesNeeded || '')}</textarea></div>
              <div class="form-row" style="grid-column:1/-1;"><label>${esc(t('editor.field.benefits', 'Benefits & Impact'))}</label><textarea id="f-benefits" rows="3" placeholder="What outcomes make this idea worth pursuing?">${esc(item?.benefits || '')}</textarea></div>
            </div>
          `)}

          ${sectionBlock(t('editor.section.optionalExtras', 'Optional Extras'), 'image', `
            <div class="form-grid-2">
              <div class="form-row"><label>${esc(t('editor.field.coverImageUrl', 'Cover Image URL'))}</label><input id="f-imageUrl" type="url" placeholder="https://..." value="${esc(item?.imageUrl || '')}"></div>
              <div class="form-row"><label>${esc(t('editor.field.deckLink', 'Deck / Demo Link'))}</label><input id="f-attachmentUrl" type="url" placeholder="Figma, Notion, pitch deck, landing page..." value="${esc(item?.attachmentUrl || '')}"></div>
            </div>
          `)}
        </div>

        <div class="page-hero__actions" style="justify-content:flex-end;margin-top:18px;">
          <button class="btn" id="cancel-btn-2"><i data-lucide="x"></i>${esc(t('editor.cancel', 'Cancel'))}</button>
          <button class="btn btn-primary" id="save-btn-2"><i data-lucide="save"></i>${esc(isNew ? t('editor.publish', 'Publish') : t('editor.saveChanges', 'Save Changes'))}</button>
        </div>
      `;

      document.getElementById('cancel-btn').onclick = back;
      document.getElementById('cancel-btn-2').onclick = back;
      document.getElementById('save-btn').onclick = save;
      document.getElementById('save-btn-2').onclick = save;

      document.querySelectorAll('.toggle-option').forEach((opt) => {
        opt.addEventListener('click', () => {
          document.querySelectorAll('.toggle-option').forEach((o) => o.classList.remove('is-active'));
          opt.classList.add('is-active');
          ideaStatus = 'approved';
        });
      });

      if (window.lucide) window.lucide.createIcons();
    }

    function navigateTo(target) {
      if (typeof window.FutureGateWorkspace?.navigate === 'function') {
        window.FutureGateWorkspace.navigate(target);
        return;
      }
      window.location.href = target;
    }

    function back() {
      navigateTo('moderation?tab=ideas');
    }

    function validatePayload(payload) {
      if (!payload.title || payload.title.length < 4) {
        showToast(t('editor.idea.titleMin', 'Idea title must be at least 4 characters.'), 'warning');
        return false;
      }
      if (!payload.description || payload.description.length < 60) {
        showToast(t('editor.idea.descMin', 'Please add more detail to the idea overview.'), 'warning');
        return false;
      }
      if (!payload.domain) {
        showToast(t('editor.idea.categoryRequired', 'Category is required.'), 'warning');
        return false;
      }
      return true;
    }

    async function save() {
      const uid = String(auth.currentUser?.uid || '').trim();
      const category = val('f-category');
      const skillsNeeded = splitCsv(val('f-skillsNeeded'));
      const description = val('f-description');
      const tagline = val('f-tagline');
      const payload = {
        title: val('f-title'),
        tagline,
        shortDescription: tagline || description,
        description,
        domain: category,
        level: val('f-level') || 'licence',
        originalLanguage: val('f-lang') || 'fr',
        category,
        stage: val('f-stage'),
        tools: skillsNeeded.join(', '),
        tags: skillsNeeded.slice(0, 3),
        skillsNeeded,
        teamNeeded: splitCsv(val('f-teamNeeded')),
        targetAudience: val('f-targetAudience'),
        problemStatement: val('f-problemStatement'),
        solution: val('f-solution'),
        resourcesNeeded: val('f-resourcesNeeded'),
        benefits: val('f-benefits'),
        imageUrl: normalizeExternalUrl(val('f-imageUrl')),
        attachmentUrl: normalizeExternalUrl(val('f-attachmentUrl')),
        isPublic: item?.isPublic !== false,
        isHidden: document.getElementById('f-hidden').checked,
        status: ideaStatus,
        submittedBy: uid,
        submittedByName: ADMIN_NAME,
        authorAvatar: String(auth.currentUser?.photoURL || item?.authorAvatar || '').trim(),
        authorPhotoType: String(item?.authorPhotoType || '').trim(),
        authorAvatarId: String(item?.authorAvatarId || '').trim(),
        updatedAt: serverTimestamp(),
      };

      if (!validatePayload(payload)) {
        return;
      }

      const saveButtons = [document.getElementById('save-btn'), document.getElementById('save-btn-2')];
      saveButtons.forEach((button) => {
        if (button) button.disabled = true;
      });

      try {
        if (isNew) {
          const ref = doc(collection(db, 'projectIdeas'));
          const created = {
            ...payload,
            id: ref.id,
            createdAt: serverTimestamp(),
          };
          await setDoc(ref, created);
          showToast(t('editor.idea.publishedToast', 'Admin idea published.'), 'success');
        } else {
          await updateDoc(doc(db, 'projectIdeas', id), payload);
          await logAdminActivity({
            type: 'project_idea',
            action: 'project_idea_updated',
            targetCollection: 'projectIdeas',
            targetId: id,
            title: payload.title || item?.title || 'Project idea',
            description: `Project idea "${payload.title || item?.title || 'Untitled'}" was updated.`,
            subjectId: payload.submittedBy || item?.submittedBy || '',
            subjectName: payload.submittedByName || item?.submittedByName || '',
            status: payload.status || item?.status || '',
          });
          showToast(t('editor.idea.updatedToast', 'Admin idea updated.'), 'success');
        }
        back();
      } catch (error) {
        console.error(error);
        showToast(t('editor.saveFailed', 'Save failed') + ': ' + (error?.message || error), 'error');
        saveButtons.forEach((button) => {
          if (button) button.disabled = false;
        });
      }
    }
  </script>
</body>
</html>
