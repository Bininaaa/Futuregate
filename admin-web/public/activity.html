<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity · FutureGate Admin</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/app.css?v=2026042401">
  <script src="js/theme-init.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="activity">
  <div id="auth-gate" class="auth-gate"><div class="spinner"></div><p>Verifying session...</p></div>
  <div id="shell"></div>

  <script type="module">
    import { mountShell, showPage } from './js/shell.js';
    import { checkAuth, emptyStateHtml, esc, feedbackCardHtml, formatTimestamp } from './js/auth.js';
    import { createActivityState, loadRecentActivitiesPage } from './js/activity-service.js';
    import { activityTypeLabel, typeColor, typeIcon, matchesSearch } from './js/admin-utils.js';
    import { openDetailsModal } from './js/details.js';
    import './js/ui.js';

    mountShell({ page: 'activity' });

    const state = { items: [], cursor: createActivityState(), hasMore: true, search: '', type: 'all' };

    checkAuth(async () => { await initActivity(); });

    async function initActivity() {
      const root = document.getElementById('page-content');
      root.innerHTML = `
        <section class="surface-panel">
          <div class="filter-bar">
            <div class="search-bar">
              <i data-lucide="search"></i>
              <input id="act-search" type="search" placeholder="Search by title, person, or status..."/>
            </div>
            <select id="act-type">
              <option value="all">All types</option>
              <option value="application">Applications</option>
              <option value="opportunity">Opportunities</option>
              <option value="scholarship">Scholarships</option>
              <option value="training">Trainings</option>
              <option value="project_idea">Project ideas</option>
            </select>
          </div>
          <div id="act-list" class="list-grid"></div>
          <div class="load-more-wrap">
            <button id="act-load" class="btn"><i data-lucide="plus"></i>Load more</button>
          </div>
        </section>
      `;

      document.getElementById('act-search').addEventListener('input', (e) => { state.search = e.target.value; render(); });
      document.getElementById('act-type').addEventListener('change', (e) => { state.type = e.target.value; render(); });
      document.getElementById('act-load').addEventListener('click', loadMore);

      await loadMore();
      showPage();
    }

    async function loadMore() {
      try {
        const result = await loadRecentActivitiesPage(state.cursor, { pageSize: 8, maxItems: 200 });
        state.cursor = result.state;
        state.items = result.items;
        state.hasMore = result.hasMore;
        document.getElementById('act-load').style.display = state.hasMore ? '' : 'none';
        render();
      } catch (e) {
        console.error(e);
        document.getElementById('act-list').innerHTML = feedbackCardHtml('Could not load activity.', { type: 'error' });
        if (window.lucide) window.lucide.createIcons();
      }
    }

    function render() {
      const list = document.getElementById('act-list');
      let items = state.items.slice();
      if (state.type !== 'all') items = items.filter((it) => it.type === state.type);
      if (state.search.trim()) items = items.filter((it) => matchesSearch([it.title, it.actorName, it.status, it.typeLabel], state.search));

      if (!items.length) {
        list.innerHTML = emptyStateHtml('Try changing the type or clearing the search.', { title: 'No matching activity', icon: 'activity' });
      } else {
        list.innerHTML = items.map((it) => `
          <div class="activity-row" data-type="${esc(it.type)}" data-id="${esc(it.targetId || '')}" role="button" tabindex="0">
            <div class="activity-icon" style="background:${typeColor(it.type)}1a;color:${typeColor(it.type)}"><i data-lucide="${typeIcon(it.type)}"></i></div>
            <div class="row-body">
              <div class="row-title">${esc(it.title)}</div>
              <div class="row-sub">${esc(it.description)}</div>
              <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;">
                <span class="badge">${esc(activityTypeLabel(it.type))}</span>
                ${it.status ? `<span class="badge badge-info">${esc(it.status)}</span>` : ''}
              </div>
            </div>
            <div class="activity-time">${esc(formatTimestamp(it.timestamp))}</div>
          </div>
        `).join('');
        list.querySelectorAll('.activity-row').forEach((row) => {
          const go = () => {
            const type = row.getAttribute('data-type');
            const id = row.getAttribute('data-id');
            if (type && id) openDetailsModal(type, id);
          };
          row.addEventListener('click', go);
          row.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(); } });
        });
      }
      if (window.lucide) window.lucide.createIcons();
    }
  </script>
</body>
</html>
