<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholarship editor · FutureGate Admin</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css?v=2026042012">
  <script src="js/theme-init.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="scholarship-editor">
  <div id="auth-gate" class="auth-gate"><div class="spinner"></div><p>Verifying session...</p></div>
  <div id="shell"></div>

  <script type="module">
    import { mountShell, showPage } from './js/shell.js';
    import { checkAuth, esc, showToast } from './js/auth.js';
    import {
      auth, db, collection, doc, getDoc, setDoc, updateDoc, serverTimestamp,
    } from './js/firebase-config.js';
    import { getQueryParam } from './js/admin-utils.js';

    mountShell({ page: 'content' });
    checkAuth(async () => { await initPage(); });

    const id = getQueryParam('id') || '';
    const isNew = !id;
    let item = null;

    async function initPage() {
      if (!isNew) {
        try {
          const snap = await getDoc(doc(db, 'scholarships', id));
          if (snap.exists()) item = { id: snap.id, ...snap.data() };
        } catch (e) { console.error(e); }
      }
      render();
      showPage();
    }

    const LANGS = [['fr','French'],['en','English'],['ar','Arabic']];
    const LEVELS = ['Bac','Licence','Master','Doctorat'];
    const FUNDING = [['fully_funded','Fully funded'],['partial','Partial'],['merit','Merit-based'],['needs','Needs-based']];

    function val(k) { return (document.getElementById(k)?.value || '').trim(); }
    function splitLines(s) { return String(s || '').split(/\r?\n/).map((x) => x.trim()).filter(Boolean); }
    function joinLines(a) { return Array.isArray(a) ? a.join('\n') : ''; }
    function splitCsv(s) { return String(s || '').split(',').map((x) => x.trim()).filter(Boolean); }
    function joinCsv(a) { return Array.isArray(a) ? a.join(', ') : ''; }
    function toDateInput(value) {
      const d = value?.toDate ? value.toDate() : (value?.seconds ? new Date(value.seconds * 1000) : (value instanceof Date ? value : null));
      if (!d) return '';
      return d.toISOString().slice(0, 10);
    }

    function sectionBlock(title, icon, html) {
      return `<section class="editor-section">
        <header class="editor-section__head">
          <div class="editor-section__icon"><i data-lucide="${icon}"></i></div>
          <h3>${esc(title)}</h3>
        </header>
        <div class="editor-section__body">${html}</div>
      </section>`;
    }

    function render() {
      const root = document.getElementById('page-content');
      const deadline = toDateInput(item?.deadline);
      const eligibility = item?.eligibilityItems || item?.eligibility_items || item?.eligibility || [];

      root.innerHTML = `
        <div class="page-breadcrumb">
          <a href="moderation?tab=scholarships" class="btn btn-ghost"><i data-lucide="arrow-left"></i>Back to content</a>
        </div>
        <header class="page-hero">
          <div>
            <h1 class="page-hero__title">${isNew ? 'Post a scholarship' : 'Edit scholarship'}</h1>
            <p class="page-hero__subtitle">${isNew ? 'Share funding programs and study opportunities with students.' : 'Update eligibility, logistics and visibility.'}</p>
          </div>
          <div class="page-hero__actions">
            <button class="btn" id="cancel-btn"><i data-lucide="x"></i>Cancel</button>
            <button class="btn btn-primary" id="save-btn"><i data-lucide="save"></i>${isNew ? 'Publish' : 'Save changes'}</button>
          </div>
        </header>

        <div class="editor-grid">
          ${sectionBlock('Basics', 'info', `
            <div class="form-grid-2">
              <div class="form-row"><label>Title *</label><input id="f-title" type="text" placeholder="MENA Excellence Scholarship 2026" value="${esc(item?.title || '')}"/></div>
              <div class="form-row"><label>Provider</label><input id="f-provider" type="text" placeholder="Ministry of Higher Education" value="${esc(item?.provider || '')}"/></div>
              <div class="form-row"><label>Language</label>
                <select id="f-lang">${LANGS.map(([v,l]) => `<option value="${v}" ${((item?.originalLanguage||'fr')===v)?'selected':''}>${l}</option>`).join('')}</select>
              </div>
              <div class="form-row"><label>Category</label><input id="f-category" type="text" placeholder="STEM · Arts · Research" value="${esc(item?.category || '')}"/></div>
              <div class="form-row"><label>Level</label>
                <select id="f-level">
                  <option value="">—</option>
                  ${LEVELS.map((l) => `<option value="${l}" ${item?.level===l?'selected':''}>${l}</option>`).join('')}
                </select>
              </div>
              <div class="form-row"><label>Funding type</label>
                <select id="f-fundingType">
                  <option value="">—</option>
                  ${FUNDING.map(([v,l]) => `<option value="${v}" ${item?.fundingType===v?'selected':''}>${l}</option>`).join('')}
                </select>
              </div>
            </div>
          `)}

          ${sectionBlock('Description & eligibility', 'file-text', `
            <div class="form-row"><label>Description</label><textarea id="f-description" rows="5" placeholder="Describe the program, what it covers and who it serves.">${esc(item?.description || '')}</textarea></div>
            <div class="form-row"><label>Eligibility (one per line)</label><textarea id="f-eligibility" rows="4" placeholder="Algerian nationality\nGPA above 14/20\nUnder 25 years old">${esc(joinLines(eligibility))}</textarea></div>
          `)}

          ${sectionBlock('Logistics', 'map-pin', `
            <div class="form-grid-2">
              <div class="form-row"><label>Amount</label><input id="f-amount" type="text" placeholder="EUR 12,000 / year" value="${esc(item?.amount ?? '')}"/></div>
              <div class="form-row"><label>Application deadline</label><input id="f-deadline" type="date" value="${esc(deadline)}"/></div>
              <div class="form-row"><label>Country</label><input id="f-country" type="text" value="${esc(item?.country || '')}"/></div>
              <div class="form-row"><label>City</label><input id="f-city" type="text" value="${esc(item?.city || '')}"/></div>
              <div class="form-row"><label>Location label</label><input id="f-loclabel" type="text" placeholder="Algiers · Multiple campuses" value="${esc(item?.locationLabel || '')}"/></div>
              <div class="form-row"><label>Application link</label><input id="f-applyUrl" type="url" placeholder="https://..." value="${esc(item?.applyUrl || '')}"/></div>
            </div>
          `)}

          ${sectionBlock('Media & visibility', 'image', `
            <div class="form-row"><label>Cover image URL</label><input id="f-image" type="url" placeholder="https://..." value="${esc(item?.image || '')}"/></div>
            <div class="form-row"><label>Tags (comma separated)</label><input id="f-tags" type="text" placeholder="research, full-funding, stem" value="${esc(joinCsv(item?.tags))}"/></div>
            <div style="display:flex;gap:18px;flex-wrap:wrap;margin-top:10px;">
              <label style="display:flex;align-items:center;gap:8px;"><input id="f-featured" type="checkbox" ${item?.isFeatured?'checked':''}/> Feature on home</label>
              <label style="display:flex;align-items:center;gap:8px;"><input id="f-hidden" type="checkbox" ${item?.isHidden?'checked':''}/> Hidden</label>
            </div>
          `)}
        </div>

        <div class="page-hero__actions" style="justify-content:flex-end;margin-top:18px;">
          <button class="btn" id="cancel-btn-2"><i data-lucide="x"></i>Cancel</button>
          <button class="btn btn-primary" id="save-btn-2"><i data-lucide="save"></i>${isNew ? 'Publish' : 'Save changes'}</button>
        </div>
      `;
      document.getElementById('cancel-btn').onclick = back;
      document.getElementById('cancel-btn-2').onclick = back;
      document.getElementById('save-btn').onclick = save;
      document.getElementById('save-btn-2').onclick = save;
      if (window.lucide) window.lucide.createIcons();
    }

    function back() { window.location.href = 'moderation?tab=scholarships'; }

    async function save() {
      const dl = val('f-deadline');
      const payload = {
        title: val('f-title'), provider: val('f-provider'),
        originalLanguage: val('f-lang'), category: val('f-category'),
        level: val('f-level'), fundingType: val('f-fundingType'),
        description: val('f-description'),
        eligibilityItems: splitLines(val('f-eligibility')),
        amount: val('f-amount'),
        deadline: dl ? new Date(dl + 'T00:00:00') : null,
        country: val('f-country'), city: val('f-city'),
        locationLabel: val('f-loclabel'), applyUrl: val('f-applyUrl'),
        image: val('f-image'), tags: splitCsv(val('f-tags')),
        isFeatured: document.getElementById('f-featured').checked,
        isHidden: document.getElementById('f-hidden').checked,
        updatedAt: serverTimestamp(),
      };
      if (!payload.title) { showToast('Title is required.', 'warning'); return; }

      const saveBtn = document.getElementById('save-btn');
      const saveBtn2 = document.getElementById('save-btn-2');
      [saveBtn, saveBtn2].forEach((b) => b && (b.disabled = true));

      try {
        if (isNew) {
          const ref = doc(collection(db, 'scholarships'));
          const created = { ...payload, id: ref.id, createdAt: serverTimestamp(), createdBy: auth.currentUser?.uid || '' };
          await setDoc(ref, created);
          showToast('Scholarship published.', 'success');
        } else {
          await updateDoc(doc(db, 'scholarships', id), payload);
          showToast('Scholarship updated.', 'success');
        }
        back();
      } catch (e) {
        console.error(e);
        showToast('Save failed: ' + (e?.message || e), 'error');
        [saveBtn, saveBtn2].forEach((b) => b && (b.disabled = false));
      }
    }
  </script>
</body>
</html>
