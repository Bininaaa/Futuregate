<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#f2f3f8">
  <meta
    name="description"
    content="FutureGate account actions for password reset, email verification, email change, and recovery."
  >
  <title>FutureGate Account Action</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="./action.css">
</head>
<body>
  <div class="bg-orbs" aria-hidden="true">
    <div class="bg-orb bg-orb-a"></div>
    <div class="bg-orb bg-orb-b"></div>
  </div>

  <main class="auth-layout">
    <section class="auth-card" aria-labelledby="pageTitle">
      <header class="card-header">
        <div class="brand-row" aria-label="FutureGate">
          <div class="brand-mark" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 9L9 3L15 9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6 15V9H12V15" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="brand-copy">
            <span class="brand-name">FutureGate</span>
            <span class="brand-sub" id="pageEyebrow">Account action</span>
          </div>
        </div>
        <span class="status-pill" id="statusChip">Checking link</span>
      </header>

      <section class="page-header">
        <h1 id="pageTitle">Checking link</h1>
        <p id="pageSubtitle">Please wait a moment.</p>
      </section>

      <div id="networkBanner" class="alert hidden" role="status" aria-live="polite"></div>
      <div id="flashBanner"   class="alert hidden" role="status" aria-live="polite"></div>

      <section id="pageContent" class="page-content" aria-live="polite" aria-busy="true">
        <div class="state-card state-loading">
          <span class="state-icon" aria-hidden="true"><span class="spinner"></span></span>
          <div class="state-body">
            <h2>Checking your link</h2>
            <p>Please wait a moment.</p>
          </div>
        </div>
      </section>

      <footer class="card-footer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 11V7a4 4 0 018 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Secure action by FutureGate</span>
      </footer>
    </section>
  </main>

  <noscript>
    <div class="noscript-overlay">
      <div class="noscript-card">
        <strong>JavaScript is required.</strong>
        <p>This page needs JavaScript to complete the secure account action.</p>
      </div>
    </div>
  </noscript>

  <script type="module" src="./action.js"></script>
</body>
</html>
